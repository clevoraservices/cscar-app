<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>CSCAR — Gestion SASU</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ── THEMES ── */
[data-theme="light"]{
  --bg:#f1f3f6;
  --surface:#ffffff;
  --surface2:#f8f9fb;
  --border:#e2e6ef;
  --border2:#c8cedc;
  --text:#111827;
  --text2:#374151;
  --muted:#6b7280;
  --muted2:#9ca3af;
  --shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 14px rgba(0,0,0,0.10);
  --header-bg:#ffffff;
  --nav-bg:#ffffff;
  --key-bg:#ffffff;
  --key-border:#e2e6ef;
  --display-bg:#1a1f2e;
  --display-amount:#f5c518;
  --display-amount-empty:#3a4252;
  --display-meta:#8892a4;
}
[data-theme="dark"]{
  --bg:#0c0f14;
  --surface:#161b24;
  --surface2:#1d2330;
  --border:#252d3a;
  --border2:#313d4f;
  --text:#edf0f6;
  --text2:#c5ccd8;
  --muted:#5a6478;
  --muted2:#8490a4;
  --shadow:0 1px 3px rgba(0,0,0,0.3);
  --shadow-md:0 4px 14px rgba(0,0,0,0.4);
  --header-bg:#111520;
  --nav-bg:#111520;
  --key-bg:#1d2330;
  --key-border:#252d3a;
  --display-bg:#090c12;
  --display-amount:#f5c518;
  --display-amount-empty:#2a3042;
  --display-meta:#5a6478;
}

/* ── COULEURS FIXES (identiques jour/nuit) ── */
:root{
  --accent:#1a56db;
  --accent-bg-l:#eef3ff; --accent-border-l:#c7d7f8; --accent-text-l:#1e3a8a;
  --accent-bg-d:#0d1e40; --accent-border-d:#1e3d6e; --accent-text-d:#93c5fd;
  --green:#16a34a;
  --green-bg-l:#f0fdf4; --green-border-l:#bbf7d0;
  --green-bg-d:#0a1f10; --green-border-d:#14532d;
  --red:#dc2626;
  --red-bg-l:#fef2f2; --red-border-l:#fecaca;
  --red-bg-d:#200a0a; --red-border-d:#3d1010;
  --gold:#d97706;
  --gold-bg-l:#fffbeb; --gold-border-l:#fde68a;
  --gold-bg-d:#1a1000; --gold-border-d:#3d2800;
  --blue:#3b82f6;
  --purple:#8b5cf6;
  --orange:#f97316;
}
[data-theme="light"]{
  --accent-bg:var(--accent-bg-l);--accent-border:var(--accent-border-l);--accent-fg:var(--accent-text-l);
  --green-bg:var(--green-bg-l);--green-border:var(--green-border-l);
  --red-bg:var(--red-bg-l);--red-border:var(--red-border-l);
  --gold-bg:var(--gold-bg-l);--gold-border:var(--gold-border-l);
}
[data-theme="dark"]{
  --accent-bg:var(--accent-bg-d);--accent-border:var(--accent-border-d);--accent-fg:var(--accent-text-d);
  --green-bg:var(--green-bg-d);--green-border:var(--green-border-d);
  --red-bg:var(--red-bg-d);--red-border:var(--red-border-d);
  --gold-bg:var(--gold-bg-d);--gold-border:var(--gold-border-d);
}

body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;transition:background 0.25s,color 0.25s}
.app{min-height:100dvh;display:flex;flex-direction:column;width:100%;max-width:520px;margin:0 auto;background:var(--bg)}

/* ── HEADER ── */
header{background:var(--header-bg);padding:11px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);width:100%;flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:9px}
.brand{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;letter-spacing:3px;line-height:1;color:var(--text)}
.tagline{font-size:0.5rem;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase;font-weight:700}
.header-right{display:flex;align-items:center;gap:7px}
.badge-alert{background:var(--red);color:#fff;border-radius:20px;padding:3px 9px;font-size:0.63rem;font-weight:800;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.today-lbl{font-size:0.58rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.saving-icon{font-size:0.68rem;color:var(--green);display:none}
/* Theme toggle */
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:0.75rem;cursor:pointer;color:var(--muted);transition:all 0.2s;line-height:1}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── ALERT BANNER ── */
.alert-banner{background:var(--gold-bg);border-bottom:1px solid var(--gold-border);padding:6px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.alert-pill{border-radius:4px;padding:3px 9px;font-size:0.65rem;font-weight:800;display:inline-flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}

/* ── CONTENT & NAV ── */
.content{flex:1;overflow-y:auto;padding:0 0 70px}
nav{position:fixed;bottom:0;left:0;right:0;width:100%;background:var(--nav-bg);border-top:2px solid var(--accent);display:flex;justify-content:space-around;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,0.08);min-height:64px}
nav button{flex:1;background:none;border:none;color:var(--muted2);padding:10px 4px 13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color 0.2s}
nav button.active{color:var(--accent)}
.nav-icon{font-size:1.5rem}
.nav-lbl{font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:700}

/* ── CARDS ── */
.cards{display:grid;gap:8px;padding:0 14px;margin-bottom:12px}
.cards-2{grid-template-columns:1fr 1fr}
.cards-3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 12px;box-shadow:var(--shadow)}
.card-lbl{font-size:0.55rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:4px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.card-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:0.5px}

/* ── TIP ── */
.tip{background:var(--accent-bg);border:1px solid var(--accent-border);border-left:3px solid var(--accent);border-radius:7px;padding:9px 12px;font-size:0.74rem;color:var(--accent-fg);line-height:1.65;margin:0 14px 14px}

/* ── SECTION HEADER ── */
.section-header{padding:14px 14px 2px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:2px;text-transform:uppercase;line-height:1}
.section-sub{font-size:0.7rem;color:var(--muted);margin-top:2px;margin-bottom:12px}

/* ════════════════════════════════════════
   TPV — TERMINAL DE PAIEMENT VIRTUEL
════════════════════════════════════════ */
.tpv-wrapper{padding:14px}

/* Afficheur */
.tpv-display{background:var(--display-bg);border-radius:14px;padding:15px 18px;margin-bottom:12px;box-shadow:var(--shadow-md)}
.tpv-display-label{font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--display-meta);font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:5px}
.tpv-display-amount{font-family:'Barlow Condensed',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:2px;line-height:1;min-height:3rem;display:flex;align-items:center;margin-bottom:10px}
.tpv-display-amount.has-val{color:var(--display-amount)}
.tpv-display-amount.empty-val{color:var(--display-amount-empty)}
.tpv-display-amount .eur{font-size:1.3rem;opacity:0.55;margin-left:5px;align-self:flex-end;margin-bottom:5px}
.tpv-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tpv-badge{display:inline-block;padding:2px 9px;border-radius:4px;font-size:0.63rem;font-weight:800;letter-spacing:1.5px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.tpv-pay-badge{background:#1e2535;color:#8892a4;padding:2px 9px;border-radius:4px;font-size:0.62rem;font-weight:700;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif}
.tpv-facture-lbl{font-size:0.65rem;color:var(--display-meta);font-style:italic}
.tpv-desc-lbl{font-size:0.68rem;color:var(--display-meta);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Modes de paiement */
.section-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:7px}
.pay-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.pay-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.15s;box-shadow:var(--shadow)}
.pay-btn:active{transform:scale(0.95)}
.pay-btn.sel{border-color:var(--accent);background:var(--accent-bg);box-shadow:0 0 0 2px rgba(26,86,219,0.15)}
.pay-btn .pay-icon{font-size:1.25rem}
.pay-btn .pay-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--text2)}
.pay-btn.sel .pay-lbl{color:var(--accent)}

/* Activités */
.tpv-act-buttons{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.tpv-act-btn{border:1.5px solid;border-radius:11px;padding:9px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.15s;min-height:58px;background:var(--surface);box-shadow:var(--shadow)}
.tpv-act-btn:active{transform:scale(0.96)}
.tpv-act-btn .act-icon{font-size:1.4rem;line-height:1}
.tpv-act-btn .act-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.82rem;letter-spacing:1.5px;text-transform:uppercase}
.tpv-act-btn .act-rate{font-size:0.58rem;opacity:0.6;letter-spacing:0.5px}

[data-theme="light"] .btn-lav{border-color:#bfdbfe;color:#1d4ed8}
[data-theme="light"] .btn-lav.sel{border-color:#3b82f6;background:#eff6ff;box-shadow:0 0 0 2px rgba(59,130,246,0.18)}
[data-theme="light"] .btn-loc{border-color:#ddd6fe;color:#7c3aed}
[data-theme="light"] .btn-loc.sel{border-color:#8b5cf6;background:#f5f3ff;box-shadow:0 0 0 2px rgba(139,92,246,0.18)}
[data-theme="light"] .btn-ven{border-color:#bbf7d0;color:#15803d}
[data-theme="light"] .btn-ven.sel{border-color:#22c55e;background:#f0fdf4;box-shadow:0 0 0 2px rgba(34,197,94,0.18)}
[data-theme="light"] .btn-aut{border-color:#fed7aa;color:#c2410c}
[data-theme="light"] .btn-aut.sel{border-color:#f97316;background:#fff7ed;box-shadow:0 0 0 2px rgba(249,115,22,0.18)}

[data-theme="dark"] .btn-lav{border-color:#1e3d6e;color:#60a5fa}
[data-theme="dark"] .btn-lav.sel{border-color:#3b82f6;background:#0d1e40;box-shadow:0 0 0 2px rgba(59,130,246,0.2)}
[data-theme="dark"] .btn-loc{border-color:#3b1f6e;color:#c084fc}
[data-theme="dark"] .btn-loc.sel{border-color:#8b5cf6;background:#1e0d40;box-shadow:0 0 0 2px rgba(139,92,246,0.2)}
[data-theme="dark"] .btn-ven{border-color:#14532d;color:#4ade80}
[data-theme="dark"] .btn-ven.sel{border-color:#22c55e;background:#0a1f10;box-shadow:0 0 0 2px rgba(34,197,94,0.2)}
[data-theme="dark"] .btn-aut{border-color:#431407;color:#fb923c}
[data-theme="dark"] .btn-aut.sel{border-color:#f97316;background:#1c0a00;box-shadow:0 0 0 2px rgba(249,115,22,0.2)}

/* Clavier numérique */
.tpv-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.tpv-key{background:var(--key-bg);border:1px solid var(--key-border);border-radius:8px;height:44px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.15rem;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;user-select:none;box-shadow:var(--shadow)}
.tpv-key:active{background:var(--surface2);transform:scale(0.95);box-shadow:none}
.tpv-key.k-zero{grid-column:span 2}
.tpv-key.k-del{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}

/* Champs supplémentaires */
.tpv-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.tpv-fields-3{grid-template-columns:1fr 1fr 1fr}
.tpv-field{display:flex;flex-direction:column;gap:3px}
.tpv-field label{font-size:0.57rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700}
input,select,textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:9px 10px;font-size:0.82rem;font-family:'Barlow',sans-serif;width:100%;outline:none;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:var(--shadow)}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(26,86,219,0.1)}
option{background:var(--surface)}

/* Bouton ENCAISSER */
.btn-encaisser{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:15px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:14px;box-shadow:0 4px 14px rgba(26,86,219,0.28)}
.btn-encaisser:active{transform:scale(0.98)}
.btn-encaisser:disabled{background:var(--border);color:var(--muted2);box-shadow:none;cursor:not-allowed}

/* ════════════════════════════════════════
   JOURNAL & ITEMS
════════════════════════════════════════ */
.journal-list{padding:0 14px}
.journal-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:var(--shadow)}
.journal-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.jbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.56rem;font-weight:800;letter-spacing:1.5px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;flex-shrink:0}
[data-theme="light"] .jb-lav{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
[data-theme="light"] .jb-loc{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
[data-theme="light"] .jb-ven{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
[data-theme="light"] .jb-aut{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
[data-theme="dark"] .jb-lav{background:#0d1e40;color:#60a5fa;border:1px solid #1e3d6e}
[data-theme="dark"] .jb-loc{background:#1e0d40;color:#c084fc;border:1px solid #3b1f6e}
[data-theme="dark"] .jb-ven{background:#0a1f10;color:#4ade80;border:1px solid #14532d}
[data-theme="dark"] .jb-aut{background:#1c0a00;color:#fb923c;border:1px solid #431407}
.jb-achat{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.journal-info{min-width:0;flex:1}
.journal-desc{font-size:0.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.journal-meta{font-size:0.6rem;color:var(--muted);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pay-chip{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:0.55rem;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;color:var(--muted)}
.j-amount{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;flex-shrink:0}
.del-btn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);border-radius:5px;padding:4px 8px;font-size:0.63rem;cursor:pointer;font-weight:800;flex-shrink:0}
.journal-empty{text-align:center;padding:28px 20px;color:var(--muted);font-size:0.82rem}

/* ════════════════════════════════════════
   ACHATS
════════════════════════════════════════ */
.form-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin:0 14px 14px;box-shadow:var(--shadow)}
.form-box-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.85rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:9px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:0.58rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;font-family:'Barlow Condensed',sans-serif}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-weight:800;font-size:0.85rem;cursor:pointer;width:100%;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;transition:opacity 0.2s}
.btn-primary:hover{opacity:0.9}
.btn-danger{background:var(--red);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-weight:800;font-size:0.85rem;cursor:pointer;width:100%;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 12px rgba(220,38,38,0.22)}
.btn-danger:hover{opacity:0.9}

/* ════════════════════════════════════════
   ANNUEL / BILAN
════════════════════════════════════════ */
.progress-bar-wrap{background:var(--border);border-radius:20px;height:8px;overflow:hidden;margin-top:6px}
.progress-bar{height:100%;border-radius:20px;transition:width 0.5s}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 14px 14px}
.month-cell{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 5px;text-align:center;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow)}
.month-cell:hover{border-color:var(--accent)}
.month-cell.now{border-color:var(--accent);background:var(--accent-bg)}
.month-cell .mn{font-size:0.52rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.month-cell .mv{font-weight:800;font-size:0.84rem;font-family:'Barlow Condensed',sans-serif}
.act-bar-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin:0 14px 14px;box-shadow:var(--shadow)}
.act-bar-title{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:800;margin-bottom:10px}
.act-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.act-bar-lbl{font-size:0.65rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1px;width:68px;flex-shrink:0}
.act-bar-bg{flex:1;background:var(--border);border-radius:20px;height:7px;overflow:hidden}
.act-bar-fill{height:100%;border-radius:20px;transition:width 0.5s}
.act-bar-val{font-size:0.65rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;width:70px;text-align:right;flex-shrink:0}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:0 14px 14px;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;min-width:300px}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border)}
th{padding:9px 8px;font-size:0.55rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--muted);font-family:'Barlow Condensed',sans-serif;text-align:left}
th.r,td.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s}
tbody tr:hover{background:var(--surface2)}
td{padding:8px 8px;font-size:0.77rem}
tfoot tr{background:var(--surface2);border-top:1px solid var(--border2)}
tfoot td{padding:9px 8px;font-size:0.8rem;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.filters{display:flex;gap:8px;margin:0 14px 12px}
.btn-row{display:flex;gap:8px;margin:0 14px 12px}

const H={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

async function sbGet(table){
  const r=await fetch(`${SUPA_URL}/rest/v1/${table}?select=*&order=date.asc`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table,row){
  const r=await fetch(`${SUPA_URL}/rest/v1/${table}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(row)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table,id){
  const r=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:H});
  if(!r.ok)throw new Error(await r.text());
}

/* ALERTES                            */

function getEcheances(){
  const y=CY,today=new Date(),ech=[];
  function add(ds,title,desc,url){
    const d=new Date(ds),diff=Math.round((d-today)/86400000);
    let status='ok',label='À venir';
    if(diff<0){status='past';label='Passée';}
    else if(diff<=7){status='urgent';label='🚨 '+diff+'j';}
    else if(diff<=30){status='soon';label='⚠️ '+diff+'j';}
    ech.push({d,title,desc,url,status,label});
  }
  if(settings.periodicite==='mensuel'){
    for(let m=0;m<12;m++){const d=new Date(y,m+1,15);add(d.toISOString().split('T')[0],'🔴 URSSAF dirigeant — '+MOIS[m],'Cotisations sociales du dirigeant '+MOIS[m],'https://www.urssaf.fr');}
  }else{
    add(y+'-04-30','🔴 URSSAF T1','Déclarer Jan, Fév, Mars\n⚠️ Même si 0€, tu DOIS déclarer !','https://www.autoentrepreneur.urssaf.fr');
    add(y+'-07-31','🔴 URSSAF T2 dirigeant','Cotisations sociales T2','https://www.urssaf.fr');
    add(y+'-10-31','🔴 URSSAF T3 dirigeant','Cotisations sociales T3','https://www.urssaf.fr');
    add((y+1)+'-01-31','🔴 URSSAF T4 dirigeant','Cotisations sociales T4','https://www.urssaf.fr');
  }
  add(y+'-05-31','📋 Liasse fiscale','Dépôt liasse fiscale + comptes annuels\\n💡 Avec ton comptable','https://www.impots.gouv.fr');
  add(y+'-06-30','🏛️ Assemblée Générale','AG annuelle SASU — approbation comptes','https://www.inpi.fr');
  add(y+'-09-15','💰 Acompte IS','Acompte Impôt sur les Sociétés','https://www.impots.gouv.fr');
  add(y+'-12-15','💼 CFE','Paiement CFE\n'+(y===2026?'💡 Exonérée 1ère année !':''),'https://www.impots.gouv.fr');
  return ech.sort((a,b)=>a.d-b.d);
}

function updateAlerts(){
  const alertes=getEcheances().filter(e=>e.status==='urgent'||e.status==='soon');
  const badge=document.getElementById('alert-badge'),banner=document.getElementById('alert-banner');
  if(alertes.length>0){
    badge.style.display='block';badge.textContent='🔔 '+alertes.length;
    banner.style.display='flex';
    banner.innerHTML=alertes.map(a=>`<span class="alert-pill" style="background:${a.status==='urgent'?'#fef2f2':'#fffbeb'};color:${a.status==='urgent'?'#dc2626':'#d97706'};border:1px solid ${a.status==='urgent'?'#fecaca':'#fde68a'}">${a.title} — ${a.label}</span>`).join('');
  }else{badge.style.display='none';banner.style.display='none';}
}

      <button class="statut-btn${statut==='impaye'?' sel-impaye':''}" onclick="selStatut('achat','impaye')">❌ Non réglé</button>
    </div>
    <div id="statut-extra-achat">${renderStatutExtra(statut, r)}</div>
  `;

      <input type="date" id="e-date-reg" value="${r.date_reglement||''}"></div>
    <div class="form-group" style="margin-top:8px"><label>Mode paiement (facultatif)</label>

function selStatut(type, statut){
  editObj.statut=statut;
  const btnsId='statut-btns-'+type;
  const extraId='statut-extra-'+type;
  const btns=document.querySelectorAll('#'+btnsId+' .statut-btn');
  btns.forEach(b=>b.className='statut-btn');
  const idx=statut==='regle'?0:statut==='echelonne'?1:2;
  const cls=statut==='regle'?'sel-regle':statut==='echelonne'?'sel-echelonne':'sel-impaye';
  btns[idx].classList.add(cls);
  const extra=document.getElementById(extraId);
  if(extra)extra.innerHTML=renderStatutExtra(statut,editObj);
}

function getExtraFields(statut){
  const out={};
  out.statut=statut;
  if(statut==='regle'){
    const dr=document.getElementById('e-date-reg');if(dr)out.date_reglement=dr.value;
    const mr=document.getElementById('e-mode-reg');if(mr)out.mode_reglement=mr.value;
  }else if(statut==='echelonne'){
    const ne=document.getElementById('e-nb-ech');if(ne)out.nb_echeances=parseInt(ne.value)||2;
    const de=document.getElementById('e-date-ech');if(de)out.date_echeance=de.value;
    const mr=document.getElementById('e-mode-reg');if(mr)out.mode_reglement=mr.value;
  }else if(statut==='impaye'){
    const de=document.getElementById('e-date-ech');if(de)out.date_echeance=de.value;
  }
  return out;
}

async function saveEdit(){
  const date=document.getElementById('e-date')?.value;
  const desc=document.getElementById('e-desc')?.value;
  const amt=parseFloat(document.getElementById('e-amt')?.value);
  const fac=document.getElementById('e-fac')?.value||'';
  const extra=getExtraFields(editObj.statut||'regle');
  if(!date||isNaN(amt)){showToast('Données invalides','err');return;}
  if(editType==='rec'){
    const act=document.getElementById('e-act')?.value||editObj.activite;
    const updated={...editObj,date,desc,amount:amt,activite:act,facture:fac,...extra};
    try{
      await fetch(`${SUPA_URL}/rest/v1/recettes?id=eq.${editId}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},
        body:JSON.stringify({date,description:desc,montant:amt,activite:act,facture:fac||null,...extra})});
      const idx=recettes.findIndex(r=>r.id===editId);
      if(idx>=0)recettes[idx]=updated;
      showToast('Recette modifiée ✓');
    }catch(e){showToast('Erreur','err');console.error(e);}
  }else if(editType==='achat'){
    const cat=document.getElementById('e-cat')?.value||editObj.cat;
    const updated={...editObj,date,desc,amount:amt,cat,facture:fac,...extra};
    try{
      await fetch(`${SUPA_URL}/rest/v1/achats?id=eq.${editId}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},
        body:JSON.stringify({date,description:desc,montant:amt,categorie:cat,facture:fac||null,...extra})});
      const idx=achats.findIndex(r=>r.id===editId);
      if(idx>=0)achats[idx]=updated;
      showToast('Achat modifié ✓');
    }catch(e){showToast('Erreur','err');console.error(e);}
  }
  document.getElementById('edit-modal').style.display='none';
  render();
}

function setSection(s){
  section=s;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+s);if(nb)nb.classList.add('active');
  render();
}
function render(){
  const c=document.getElementById('content');if(!c)return;
  if(section==='tpv')renderTPV(c);
  else if(section==='achats')renderAchats(c);
  else if(section==='compta')renderCompta(c);
  else if(section==='journal')renderJournal(c);
  else if(section==='annuel')renderAnnuel(c);
  else if(section==='bilan')renderBilan(c);
  else if(section==='echeances')renderEcheances(c);
}

function updDisp(){
  const amtNum=parseFloat(tpvAmt)||0;
  const disp=document.querySelector('.tpv-display-amount');
  if(disp){disp.className='tpv-display-amount '+(amtNum>0?'has-val':'empty-val');disp.innerHTML=(amtNum>0?tpvAmt.replace('.',','):'0,00')+'<span class="eur">€</span>';}
  const factLbl=document.querySelector('.tpv-facture-lbl');
  const meta=document.querySelector('.tpv-meta');
  if(meta){
    // rebuild facture badge
    let fLbl=meta.querySelector('.tpv-facture-lbl');
    if(tpvFacture&&!fLbl){const span=document.createElement('span');span.className='tpv-facture-lbl';span.textContent='#'+tpvFacture;const descEl=meta.querySelector('.tpv-desc-lbl');meta.insertBefore(span,descEl);}
    else if(fLbl){fLbl.textContent=tpvFacture?'#'+tpvFacture:'';}
    const descEl=meta.querySelector('.tpv-desc-lbl');
    if(descEl)descEl.innerHTML=tpvDesc||'<span style="opacity:0.4">Description...</span>';
  }
  const btn=document.querySelector('.btn-encaisser');
  if(btn){btn.disabled=amtNum<=0;btn.textContent='✓ ENCAISSER'+(amtNum>0?' — '+amtNum.toFixed(2)+' €':'');}
}

function kp(k){
  if(k==='.'){if(tpvAmt.includes('.'))return;if(!tpvAmt)tpvAmt='0';tpvAmt+='.';}
  else{if(tpvAmt.includes('.')&&tpvAmt.split('.')[1].length>=2)return;if(tpvAmt==='0')tpvAmt=k;else tpvAmt+=k;if(tpvAmt.length>9)return;}
  updDisp();
}
function kd(){tpvAmt=tpvAmt.slice(0,-1);updDisp();}

function selPay(k){
  tpvPay=k;
  const p=getPay(k);
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('sel'));
  const btn=[...document.querySelectorAll('.pay-btn')].find(b=>b.onclick&&b.onclick.toString().includes(`'${k}'`));
  document.querySelectorAll('.pay-btn').forEach((b,i)=>{if(PAYS[i]&&PAYS[i].key===k)b.classList.add('sel');});
  const payBadge=document.querySelector('.tpv-pay-badge');
  if(payBadge)payBadge.textContent=p.icon+' '+p.label;
}

function selAct(k){
  tpvAct=k;
  const a=getAct(k);
  document.querySelectorAll('.tpv-act-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.tpv-act-btn').forEach((b,i)=>{if(ACTS[i]&&ACTS[i].key===k)b.classList.add('sel');});
  const actBadge=document.querySelector('.tpv-badge');
  if(actBadge){actBadge.textContent=a.icon+' '+a.label;actBadge.style.cssText=`background:${a.color}22;color:${a.color};border:1px solid ${a.color}44`;}
}

async function encaisser(){
  const amt=parseFloat(tpvAmt);
  if(isNaN(amt)||amt<=0){showToast('Montant invalide','err');return;}
  const btn=document.querySelector('.btn-encaisser');if(btn)btn.disabled=true;
  try{
    const rows=await sbInsert('recettes',{date:tpvDate,description:tpvDesc||getAct(tpvAct).label,montant:amt,activite:tpvAct,paiement:tpvPay,facture:tpvFacture||null});
    const r=rows[0];
    recettes.push({id:r.id,date:r.date,desc:r.description,amount:parseFloat(r.montant),activite:r.activite,paiement:r.paiement,facture:r.facture||''});
    tpvAmt='';tpvDesc='';tpvFacture='';
    showToast('+'+amt.toFixed(2)+' € encaissé ✓');render();
  }catch(e){showToast('Erreur sauvegarde','err');console.error(e);if(btn)btn.disabled=false;}
}

async function delRec(id){
  if(!confirm('Supprimer ?'))return;
  try{await sbDelete('recettes',id);recettes=recettes.filter(r=>r.id!==id);showToast('Supprimé');render();}
  catch(e){showToast('Erreur suppression','err');}
}
async function delAchat(id){
  if(!confirm('Supprimer cet achat ?'))return;
  try{await sbDelete('achats',id);achats=achats.filter(a=>a.id!==id);showToast('Achat supprimé');render();}
  catch(e){showToast('Erreur suppression','err');}
}

async function addAchat(){
  const date=document.getElementById('a-date')?.value||achatForm.date;
  const desc=document.getElementById('a-desc')?.value||achatForm.desc;
  const amount=document.getElementById('a-amt')?.value||achatForm.amount;
  const cat=document.getElementById('a-cat')?.value||achatForm.cat;
  const facture=document.getElementById('a-fac')?.value||achatForm.facture;
  if(!date||!amount){showToast('Date et montant requis','err');return;}
  const amt=parseFloat(amount);
  if(isNaN(amt)||amt<=0){showToast('Montant invalide','err');return;}
  try{
    const rows=await sbInsert('achats',{date,description:desc,montant:amt,categorie:cat,fournisseur:'',facture:facture||null});
    const r=rows[0];
    achats.push({id:r.id,date:r.date,desc:r.description,amount:parseFloat(r.montant),cat:r.categorie||'Autre',facture:r.facture||''});
    achatForm={date,desc:'',amount:'',cat,facture:''};
    showToast('-'+amt.toFixed(2)+' € enregistré ✓');render();
  }catch(e){showToast('Erreur sauvegarde','err');console.error(e);}
}

function saveSet(){
  ['nom','gerant','siret','codeape','activite','adresse'].forEach(k=>{const el=document.getElementById('s-'+k);if(el)settings[k]=el.value;});
  const p=document.getElementById('s-peri');if(p)settings.periodicite=p.value;
  const r=document.getElementById('s-reg');if(r)settings.regime=r.value;
  saveCfg();updateAlerts();showToast('Paramètres sauvegardés ✓');render();
}

function exportCSV(type){
  const data=type==='month'?getMonthRecs(filterYear,filterMonth):getYearRecs(filterYear);
  const period=type==='month'?MOIS[filterMonth]+'_'+filterYear:''+filterYear;
  const header='Date;N° Facture;Activité;Libellé;Mode paiement;Crédit;Solde\n';
  let solde=0;
  const rows=[...data].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
    solde+=r.amount;const a=getAct(r.activite),p=getPay(r.paiement||'cb');
    return`${r.date};${r.facture||''};${a.label};${r.desc};${p.label};${r.amount.toFixed(2).replace('.',',')};${solde.toFixed(2).replace('.',',')}`;}).join('\n');
  const total=sum(data),co=cotisArr(data);
  // Achats
  const acData=type==='month'?getMonthAchats(filterYear,filterMonth):getYearAchats(filterYear);
  const acRows='\n\nACHATS / CHARGES\nDate;N° Facture;Catégorie;Libellé;Montant\n'+[...acData].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>`${r.date};${r.facture||''};${r.cat};${r.desc};${r.amount.toFixed(2).replace('.',',')}`).join('\n');
  const blob=new Blob(['\uFEFF'+header+rows+`\n;;TOTAL RECETTES;;;;${total.toFixed(2).replace('.',',')};${total.toFixed(2).replace('.',',')}\n;;Cotisations (URSSAF);;;${co.toFixed(2).replace('.',',')};;`+acRows],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`CSCAR_${period}.csv`;a.click();
  showToast('CSV téléchargé ✓');
}

  <div class="period">📊 ${type==='month'?'Relevé mensuel':'Bilan annuel'} — ${period}</div>
  ${actSum?`<div class="act-section"><div class="act-title">Répartition par activité</div>${actSum}</div>`:''}
  <table><thead><tr><th>Date</th><th>N° Facture</th><th>Activité</th><th>Libellé</th><th>Paiement</th><th style="text-align:right">Montant</th><th style="text-align:right">Solde</th></tr></thead>
  <tbody>${rows||'<tr><td colspan="7" style="text-align:center;color:#aaa;padding:16px">Aucune recette</td></tr>'}</tbody>
  <tfoot><tr><td colspan="5"><strong>TOTAL RECETTES ${period}</strong></td><td style="text-align:right;color:#16a34a"><strong>${total.toFixed(2)} €</strong></td><td></td></tr></tfoot></table>
  <div class="summary">
    <div class="sum-card"><div class="sum-label">CA</div><div class="sum-val" style="color:#16a34a">${total.toFixed(2)} €</div></div>
    <div class="sum-card"><div class="sum-label">Cotisations</div><div class="sum-val" style="color:#dc2626">-${co.toFixed(2)} €</div></div>
    <div class="sum-card"><div class="sum-label">Achats</div><div class="sum-val" style="color:#dc2626">-${achTotal.toFixed(2)} €</div></div>
    <div class="sum-card"><div class="sum-label">Résultat net</div><div class="sum-val" style="color:#1a56db">${(total-co-achTotal).toFixed(2)} €</div></div>
  </div>
  ${acRows?`<table><thead><tr><th>Date</th><th>N° Facture</th><th>Catégorie</th><th>Libellé</th><th style="text-align:right">Montant</th></tr></thead>
  <tbody>${acRows}</tbody><tfoot><tr><td colspan="4"><strong>TOTAL ACHATS</strong></td><td style="text-align:right;color:#dc2626"><strong>-${achTotal.toFixed(2)} €</strong></td></tr></tfoot></table>`:''}
  <div class="footer">Généré par CSCAR Gestion · Document indicatif, non certifié comptable.</div>
  </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);
  showToast('PDF généré ✓');
}

<title>CSCAR — Gestion SASU</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ── THEMES ── */
[data-theme="light"]{
  --bg:#f1f3f6;
  --surface:#ffffff;
  --surface2:#f8f9fb;
  --border:#e2e6ef;
  --border2:#c8cedc;
  --text:#111827;
  --text2:#374151;
  --muted:#6b7280;
  --muted2:#9ca3af;
  --shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);

  --header-bg:#ffffff;
  --nav-bg:#ffffff;
  --key-bg:#ffffff;
  --key-border:#e2e6ef;
  --display-bg:#1a1f2e;
  --display-amount:#f5c518;
  --display-amount-empty:#3a4252;
  --display-meta:#8892a4;
}
[data-theme="dark"]{
  --bg:#0c0f14;

  --surface2:#1d2330;
  --border:#252d3a;
  --border2:#313d4f;
  --text:#edf0f6;
  --text2:#c5ccd8;
  --muted:#5a6478;
  --muted2:#8490a4;
  --shadow:0 1px 3px rgba(0,0,0,0.3);
  --shadow-md:0 4px 14px rgba(0,0,0,0.4);
  --header-bg:#111520;
  --nav-bg:#111520;
  --key-bg:#1d2330;

  --display-bg:#090c12;
  --display-amount:#f5c518;
  --display-amount-empty:#2a3042;
  --display-meta:#5a6478;
}

/* ── COULEURS FIXES (identiques jour/nuit) ── */
:root{
  --accent:#1a56db;
  --accent-bg-l:#eef3ff; --accent-border-l:#c7d7f8; --accent-text-l:#1e3a8a;
  --accent-bg-d:#0d1e40; --accent-border-d:#1e3d6e; --accent-text-d:#93c5fd;
  --green:#16a34a;
  --green-bg-l:#f0fdf4; --green-border-l:#bbf7d0;
  --green-bg-d:#0a1f10; --green-border-d:#14532d;
  --red:#dc2626;
  --red-bg-l:#fef2f2; --red-border-l:#fecaca;
  --red-bg-d:#200a0a; --red-border-d:#3d1010;
  --gold:#d97706;
  --gold-bg-l:#fffbeb; --gold-border-l:#fde68a;
  --gold-bg-d:#1a1000; --gold-border-d:#3d2800;
  --blue:#3b82f6;
  --purple:#8b5cf6;
  --orange:#f97316;
}
[data-theme="light"]{
  --accent-bg:var(--accent-bg-l);--accent-border:var(--accent-border-l);--accent-fg:var(--accent-text-l);
  --green-bg:var(--green-bg-l);--green-border:var(--green-border-l);
  --red-bg:var(--red-bg-l);--red-border:var(--red-border-l);
  --gold-bg:var(--gold-bg-l);--gold-border:var(--gold-border-l);
}
[data-theme="dark"]{
  --accent-bg:var(--accent-bg-d);--accent-border:var(--accent-border-d);--accent-fg:var(--accent-text-d);
  --green-bg:var(--green-bg-d);--green-border:var(--green-border-d);
  --red-bg:var(--red-bg-d);--red-border:var(--red-border-d);
  --gold-bg:var(--gold-bg-d);--gold-border:var(--gold-border-d);
}

body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;transition:background 0.25s,color 0.25s}
.app{min-height:100dvh;display:flex;flex-direction:column;max-width:680px;margin:0 auto;background:var(--bg)}

/* ── HEADER ── */
header{background:var(--header-bg);padding:11px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);width:100%;flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:9px}
.brand{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;letter-spacing:3px;line-height:1;color:var(--text)}
.tagline{font-size:0.5rem;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase;font-weight:700}
.header-right{display:flex;align-items:center;gap:7px}
.badge-alert{background:var(--red);color:#fff;border-radius:20px;padding:3px 9px;font-size:0.63rem;font-weight:800;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.today-lbl{font-size:0.58rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.saving-icon{font-size:0.68rem;color:var(--green);display:none}
/* Theme toggle */
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:0.75rem;cursor:pointer;color:var(--muted);transition:all 0.2s;line-height:1}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── ALERT BANNER ── */
.alert-banner{background:var(--gold-bg);border-bottom:1px solid var(--gold-border);padding:6px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.alert-pill{border-radius:4px;padding:3px 9px;font-size:0.65rem;font-weight:800;display:inline-flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}

/* ── CONTENT & NAV ── */
.content{flex:1;overflow-y:auto;padding:0 0 86px}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:var(--nav-bg);border-top:1px solid var(--border);display:flex;justify-content:space-around;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,0.08)}
nav button{flex:1;background:none;border:none;color:var(--muted2);padding:7px 2px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color 0.2s}
nav button.active{color:var(--accent)}
.nav-icon{font-size:1.1rem}
.nav-lbl{font-size:0.5rem;letter-spacing:0.8px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:700}

/* ── CARDS ── */
.cards{display:grid;gap:8px;padding:0 14px;margin-bottom:12px}
.cards-2{grid-template-columns:1fr 1fr}
.cards-3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 12px;box-shadow:var(--shadow)}
.card-lbl{font-size:0.55rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:4px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.card-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:0.5px}

/* ── TIP ── */
.tip{background:var(--accent-bg);border:1px solid var(--accent-border);border-left:3px solid var(--accent);border-radius:7px;padding:9px 12px;font-size:0.74rem;color:var(--accent-fg);line-height:1.65;margin:0 14px 14px}

/* ── SECTION HEADER ── */
.section-header{padding:14px 14px 2px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:2px;text-transform:uppercase;line-height:1}
.section-sub{font-size:0.7rem;color:var(--muted);margin-top:2px;margin-bottom:12px}

/* ════════════════════════════════════════
   TPV — TERMINAL DE PAIEMENT VIRTUEL
════════════════════════════════════════ */
.tpv-wrapper{padding:14px}

/* Afficheur */
.tpv-display{background:var(--display-bg);border-radius:14px;padding:15px 18px;margin-bottom:12px;box-shadow:var(--shadow-md)}
.tpv-display-label{font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--display-meta);font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:5px}
.tpv-display-amount{font-family:'Barlow Condensed',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:2px;line-height:1;min-height:3rem;display:flex;align-items:center;margin-bottom:10px}
.tpv-display-amount.has-val{color:var(--display-amount)}
.tpv-display-amount.empty-val{color:var(--display-amount-empty)}
.tpv-display-amount .eur{font-size:1.3rem;opacity:0.55;margin-left:5px;align-self:flex-end;margin-bottom:5px}
.tpv-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tpv-badge{display:inline-block;padding:2px 9px;border-radius:4px;font-size:0.63rem;font-weight:800;letter-spacing:1.5px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.tpv-pay-badge{background:#1e2535;color:#8892a4;padding:2px 9px;border-radius:4px;font-size:0.62rem;font-weight:700;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif}
.tpv-facture-lbl{font-size:0.65rem;color:var(--display-meta);font-style:italic}
.tpv-desc-lbl{font-size:0.68rem;color:var(--display-meta);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Modes de paiement */
.section-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:7px}
.pay-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.pay-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.15s;box-shadow:var(--shadow)}
.pay-btn:active{transform:scale(0.95)}
.pay-btn.sel{border-color:var(--accent);background:var(--accent-bg);box-shadow:0 0 0 2px rgba(26,86,219,0.15)}
.pay-btn .pay-icon{font-size:1.25rem}
.pay-btn .pay-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--text2)}
.pay-btn.sel .pay-lbl{color:var(--accent)}

/* Activités */
.tpv-act-buttons{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.tpv-act-btn{border:1.5px solid;border-radius:11px;padding:9px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.15s;min-height:58px;background:var(--surface);box-shadow:var(--shadow)}
.tpv-act-btn:active{transform:scale(0.96)}
.tpv-act-btn .act-icon{font-size:1.4rem;line-height:1}
.tpv-act-btn .act-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.82rem;letter-spacing:1.5px;text-transform:uppercase}
.tpv-act-btn .act-rate{font-size:0.58rem;opacity:0.6;letter-spacing:0.5px}

[data-theme="light"] .btn-lav{border-color:#bfdbfe;color:#1d4ed8}
[data-theme="light"] .btn-lav.sel{border-color:#3b82f6;background:#eff6ff;box-shadow:0 0 0 2px rgba(59,130,246,0.18)}
[data-theme="light"] .btn-loc{border-color:#ddd6fe;color:#7c3aed}
[data-theme="light"] .btn-loc.sel{border-color:#8b5cf6;background:#f5f3ff;box-shadow:0 0 0 2px rgba(139,92,246,0.18)}
[data-theme="light"] .btn-ven{border-color:#bbf7d0;color:#15803d}
[data-theme="light"] .btn-ven.sel{border-color:#22c55e;background:#f0fdf4;box-shadow:0 0 0 2px rgba(34,197,94,0.18)}
[data-theme="light"] .btn-aut{border-color:#fed7aa;color:#c2410c}
[data-theme="light"] .btn-aut.sel{border-color:#f97316;background:#fff7ed;box-shadow:0 0 0 2px rgba(249,115,22,0.18)}

[data-theme="dark"] .btn-lav{border-color:#1e3d6e;color:#60a5fa}
[data-theme="dark"] .btn-lav.sel{border-color:#3b82f6;background:#0d1e40;box-shadow:0 0 0 2px rgba(59,130,246,0.2)}
[data-theme="dark"] .btn-loc{border-color:#3b1f6e;color:#c084fc}
[data-theme="dark"] .btn-loc.sel{border-color:#8b5cf6;background:#1e0d40;box-shadow:0 0 0 2px rgba(139,92,246,0.2)}
[data-theme="dark"] .btn-ven{border-color:#14532d;color:#4ade80}
[data-theme="dark"] .btn-ven.sel{border-color:#22c55e;background:#0a1f10;box-shadow:0 0 0 2px rgba(34,197,94,0.2)}
[data-theme="dark"] .btn-aut{border-color:#431407;color:#fb923c}
[data-theme="dark"] .btn-aut.sel{border-color:#f97316;background:#1c0a00;box-shadow:0 0 0 2px rgba(249,115,22,0.2)}

/* Clavier numérique */
.tpv-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.tpv-key{background:var(--key-bg);border:1px solid var(--key-border);border-radius:8px;height:44px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.15rem;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;user-select:none;box-shadow:var(--shadow)}
.tpv-key:active{background:var(--surface2);transform:scale(0.95);box-shadow:none}
.tpv-key.k-zero{grid-column:span 2}
.tpv-key.k-del{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}

/* Champs supplémentaires */
.tpv-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.tpv-fields-3{grid-template-columns:1fr 1fr 1fr}
.tpv-field{display:flex;flex-direction:column;gap:3px}
.tpv-field label{font-size:0.57rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700}
input,select,textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:9px 10px;font-size:0.82rem;font-family:'Barlow',sans-serif;width:100%;outline:none;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:var(--shadow)}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(26,86,219,0.1)}
option{background:var(--surface)}

/* Bouton ENCAISSER */
.btn-encaisser{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:15px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:14px;box-shadow:0 4px 14px rgba(26,86,219,0.28)}
.btn-encaisser:active{transform:scale(0.98)}
.btn-encaisser:disabled{background:var(--border);color:var(--muted2);box-shadow:none;cursor:not-allowed}

/* ════════════════════════════════════════
   JOURNAL & ITEMS
════════════════════════════════════════ */
.journal-list{padding:0 14px}
.journal-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:var(--shadow)}
.journal-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.jbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.56rem;font-weight:800;letter-spacing:1.5px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;flex-shrink:0}
[data-theme="light"] .jb-lav{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
[data-theme="light"] .jb-loc{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
[data-theme="light"] .jb-ven{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
[data-theme="light"] .jb-aut{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
[data-theme="dark"] .jb-lav{background:#0d1e40;color:#60a5fa;border:1px solid #1e3d6e}
[data-theme="dark"] .jb-loc{background:#1e0d40;color:#c084fc;border:1px solid #3b1f6e}
[data-theme="dark"] .jb-ven{background:#0a1f10;color:#4ade80;border:1px solid #14532d}
[data-theme="dark"] .jb-aut{background:#1c0a00;color:#fb923c;border:1px solid #431407}
.jb-achat{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.journal-info{min-width:0;flex:1}
.journal-desc{font-size:0.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.journal-meta{font-size:0.6rem;color:var(--muted);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pay-chip{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:0.55rem;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;color:var(--muted)}
.j-amount{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;flex-shrink:0}
.del-btn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);border-radius:5px;padding:4px 8px;font-size:0.63rem;cursor:pointer;font-weight:800;flex-shrink:0}
.journal-empty{text-align:center;padding:28px 20px;color:var(--muted);font-size:0.82rem}

/* ════════════════════════════════════════
   ACHATS
════════════════════════════════════════ */
.form-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin:0 14px 14px;box-shadow:var(--shadow)}
.form-box-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.85rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:9px;margin-bottom:12px}

async function sbGet(table){
  const r=await fetch(`${SUPA_URL}/rest/v1/${table}?select=*&order=date.asc`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table,row){
  const r=await fetch(`${SUPA_URL}/rest/v1/${table}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(row)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table,id){
  const r=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:H});
  if(!r.ok)throw new Error(await r.text());
}

function getEcheances(){
  const y=CY,today=new Date(),ech=[];
  function add(ds,title,desc,url){
    const d=new Date(ds),diff=Math.round((d-today)/86400000);
    let status='ok',label='À venir';
    if(diff<0){status='past';label='Passée';}
    else if(diff<=7){status='urgent';label='🚨 '+diff+'j';}
    else if(diff<=30){status='soon';label='⚠️ '+diff+'j';}
    ech.push({d,title,desc,url,status,label});
  }
  if(settings.periodicite==='mensuel'){
    for(let m=0;m<12;m++){const d=new Date(y,m+1,15);add(d.toISOString().split('T')[0],'🔴 URSSAF dirigeant — '+MOIS[m],'Cotisations sociales du dirigeant '+MOIS[m],'https://www.urssaf.fr');}
  }else{
    add(y+'-04-30','🔴 URSSAF T1','Déclarer Jan, Fév, Mars\n⚠️ Même si 0€, tu DOIS déclarer !','https://www.autoentrepreneur.urssaf.fr');
    add(y+'-07-31','🔴 URSSAF T2 dirigeant','Cotisations sociales T2','https://www.urssaf.fr');
    add(y+'-10-31','🔴 URSSAF T3 dirigeant','Cotisations sociales T3','https://www.urssaf.fr');
    add((y+1)+'-01-31','🔴 URSSAF T4 dirigeant','Cotisations sociales T4','https://www.urssaf.fr');
  }
  add(y+'-05-31','📋 Liasse fiscale','Dépôt liasse fiscale + comptes annuels\\n💡 Avec ton comptable','https://www.impots.gouv.fr');
  add(y+'-06-30','🏛️ Assemblée Générale','AG annuelle SASU — approbation comptes','https://www.inpi.fr');
  add(y+'-09-15','💰 Acompte IS','Acompte Impôt sur les Sociétés','https://www.impots.gouv.fr');
  add(y+'-12-15','💼 CFE','Paiement CFE\n'+(y===2026?'💡 Exonérée 1ère année !':''),'https://www.impots.gouv.fr');
  return ech.sort((a,b)=>a.d-b.d);
}

function updateAlerts(){
  const alertes=getEcheances().filter(e=>e.status==='urgent'||e.status==='soon');
  const badge=document.getElementById('alert-badge'),banner=document.getElementById('alert-banner');
  if(alertes.length>0){
    badge.style.display='block';badge.textContent='🔔 '+alertes.length;
    banner.style.display='flex';
    banner.innerHTML=alertes.map(a=>`<span class="alert-pill" style="background:${a.status==='urgent'?'#fef2f2':'#fffbeb'};color:${a.status==='urgent'?'#dc2626':'#d97706'};border:1px solid ${a.status==='urgent'?'#fecaca':'#fde68a'}">${a.title} — ${a.label}</span>`).join('');
  }else{badge.style.display='none';banner.style.display='none';}
}

function renderStatutExtra(statut, r){
  if(statut==='regle') return `
    <div class="form-group" style="margin-top:8px"><label>Date de règlement</label>
      <input type="date" id="e-date-reg" value="${r.date_reglement||''}"></div>
    <div class="form-group" style="margin-top:8px"><label>Mode paiement (facultatif)</label>
      <select id="e-mode-reg">
        <option value="">— Non précisé —</option>
        ${PAYS.map(p=>`<option value="${p.key}"${r.mode_reglement===p.key?' selected':''}>${p.icon} ${p.label}</option>`).join('')}
      </select></div>`;
  if(statut==='echelonne') return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
      <div class="form-group"><label>Nb d'échéances</label>
        <input type="number" id="e-nb-ech" value="${r.nb_echeances||2}" min="2" max="36"></div>
      <div class="form-group"><label>1ère échéance</label>
        <input type="date" id="e-date-ech" value="${r.date_echeance||''}"></div>
    </div>
    <div class="form-group" style="margin-top:8px"><label>Mode paiement (facultatif)</label>
      <select id="e-mode-reg">
        <option value="">— Non précisé —</option>
        ${PAYS.map(p=>`<option value="${p.key}"${r.mode_reglement===p.key?' selected':''}>${p.icon} ${p.label}</option>`).join('')}
      </select></div>`;
  if(statut==='impaye') return `
    <div class="form-group" style="margin-top:8px"><label>Date d'échéance prévue</label>
      <input type="date" id="e-date-ech" value="${r.date_echeance||''}"></div>`;
  return '';
}

function selStatut(type, statut){
  editObj.statut=statut;
  const btnsId='statut-btns-'+type;
  const extraId='statut-extra-'+type;
  const btns=document.querySelectorAll('#'+btnsId+' .statut-btn');
  btns.forEach(b=>b.className='statut-btn');
  const idx=statut==='regle'?0:statut==='echelonne'?1:2;
  const cls=statut==='regle'?'sel-regle':statut==='echelonne'?'sel-echelonne':'sel-impaye';
  btns[idx].classList.add(cls);
  const extra=document.getElementById(extraId);
  if(extra)extra.innerHTML=renderStatutExtra(statut,editObj);
}

function getExtraFields(statut){
  const out={};
  out.statut=statut;
  if(statut==='regle'){
    const dr=document.getElementById('e-date-reg');if(dr)out.date_reglement=dr.value;
    const mr=document.getElementById('e-mode-reg');if(mr)out.mode_reglement=mr.value;
  }else if(statut==='echelonne'){
    const ne=document.getElementById('e-nb-ech');if(ne)out.nb_echeances=parseInt(ne.value)||2;
    const de=document.getElementById('e-date-ech');if(de)out.date_echeance=de.value;
    const mr=document.getElementById('e-mode-reg');if(mr)out.mode_reglement=mr.value;
  }else if(statut==='impaye'){
    const de=document.getElementById('e-date-ech');if(de)out.date_echeance=de.value;
  }
  return out;
}

async function saveEdit(){
  const date=document.getElementById('e-date')?.value;
  const desc=document.getElementById('e-desc')?.value;
  const amt=parseFloat(document.getElementById('e-amt')?.value);
  const fac=document.getElementById('e-fac')?.value||'';
  const extra=getExtraFields(editObj.statut||'regle');
  if(!date||isNaN(amt)){showToast('Données invalides','err');return;}
  if(editType==='rec'){
    const act=document.getElementById('e-act')?.value||editObj.activite;
    const updated={...editObj,date,desc,amount:amt,activite:act,facture:fac,...extra};
    try{
      await fetch(`${SUPA_URL}/rest/v1/recettes?id=eq.${editId}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},
        body:JSON.stringify({date,description:desc,montant:amt,activite:act,facture:fac||null,...extra})});
      const idx=recettes.findIndex(r=>r.id===editId);
      if(idx>=0)recettes[idx]=updated;
      showToast('Recette modifiée ✓');
    }catch(e){showToast('Erreur','err');console.error(e);}
  }else if(editType==='achat'){
    const cat=document.getElementById('e-cat')?.value||editObj.cat;
    const updated={...editObj,date,desc,amount:amt,cat,facture:fac,...extra};
    try{
      await fetch(`${SUPA_URL}/rest/v1/achats?id=eq.${editId}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},
        body:JSON.stringify({date,description:desc,montant:amt,categorie:cat,facture:fac||null,...extra})});
      const idx=achats.findIndex(r=>r.id===editId);
      if(idx>=0)achats[idx]=updated;
      showToast('Achat modifié ✓');
    }catch(e){showToast('Erreur','err');console.error(e);}
  }
  document.getElementById('edit-modal').style.display='none';
  render();
}

function setSection(s){
  section=s;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+s);if(nb)nb.classList.add('active');
  render();
}
function render(){
  const c=document.getElementById('content');if(!c)return;
  if(section==='tpv')renderTPV(c);
  else if(section==='achats')renderAchats(c);
  else if(section==='compta')renderCompta(c);
  else if(section==='journal')renderJournal(c);
  else if(section==='annuel')renderAnnuel(c);
  else if(section==='bilan')renderBilan(c);
  else if(section==='echeances')renderEcheances(c);
}

function updDisp(){
  const amtNum=parseFloat(tpvAmt)||0;
  const disp=document.querySelector('.tpv-display-amount');
  if(disp){disp.className='tpv-display-amount '+(amtNum>0?'has-val':'empty-val');disp.innerHTML=(amtNum>0?tpvAmt.replace('.',','):'0,00')+'<span class="eur">€</span>';}
  const factLbl=document.querySelector('.tpv-facture-lbl');
  const meta=document.querySelector('.tpv-meta');
  if(meta){
    // rebuild facture badge
    let fLbl=meta.querySelector('.tpv-facture-lbl');
    if(tpvFacture&&!fLbl){const span=document.createElement('span');span.className='tpv-facture-lbl';span.textContent='#'+tpvFacture;const descEl=meta.querySelector('.tpv-desc-lbl');meta.insertBefore(span,descEl);}
    else if(fLbl){fLbl.textContent=tpvFacture?'#'+tpvFacture:'';}
    const descEl=meta.querySelector('.tpv-desc-lbl');
    if(descEl)descEl.innerHTML=tpvDesc||'<span style="opacity:0.4">Description...</span>';
  }
  const btn=document.querySelector('.btn-encaisser');
  if(btn){btn.disabled=amtNum<=0;btn.textContent='✓ ENCAISSER'+(amtNum>0?' — '+amtNum.toFixed(2)+' €':'');}
}

function kp(k){
  if(k==='.'){if(tpvAmt.includes('.'))return;if(!tpvAmt)tpvAmt='0';tpvAmt+='.';}
  else{if(tpvAmt.includes('.')&&tpvAmt.split('.')[1].length>=2)return;if(tpvAmt==='0')tpvAmt=k;else tpvAmt+=k;if(tpvAmt.length>9)return;}
  updDisp();
}
function kd(){tpvAmt=tpvAmt.slice(0,-1);updDisp();}

function selPay(k){
  tpvPay=k;
  const p=getPay(k);
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('sel'));
  const btn=[...document.querySelectorAll('.pay-btn')].find(b=>b.onclick&&b.onclick.toString().includes(`'${k}'`));
  document.querySelectorAll('.pay-btn').forEach((b,i)=>{if(PAYS[i]&&PAYS[i].key===k)b.classList.add('sel');});
  const payBadge=document.querySelector('.tpv-pay-badge');
  if(payBadge)payBadge.textContent=p.icon+' '+p.label;
}

function selAct(k){
  tpvAct=k;
  const a=getAct(k);
  document.querySelectorAll('.tpv-act-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.tpv-act-btn').forEach((b,i)=>{if(ACTS[i]&&ACTS[i].key===k)b.classList.add('sel');});
  const actBadge=document.querySelector('.tpv-badge');
  if(actBadge){actBadge.textContent=a.icon+' '+a.label;actBadge.style.cssText=`background:${a.color}22;color:${a.color};border:1px solid ${a.color}44`;}
}

async function encaisser(){
  const amt=parseFloat(tpvAmt);
  if(isNaN(amt)||amt<=0){showToast('Montant invalide','err');return;}
  const btn=document.querySelector('.btn-encaisser');if(btn)btn.disabled=true;
  try{
    const rows=await sbInsert('recettes',{date:tpvDate,description:tpvDesc||getAct(tpvAct).label,montant:amt,activite:tpvAct,paiement:tpvPay,facture:tpvFacture||null});
    const r=rows[0];
    recettes.push({id:r.id,date:r.date,desc:r.description,amount:parseFloat(r.montant),activite:r.activite,paiement:r.paiement,facture:r.facture||''});
    tpvAmt='';tpvDesc='';tpvFacture='';
    showToast('+'+amt.toFixed(2)+' € encaissé ✓');render();
  }catch(e){showToast('Erreur sauvegarde','err');console.error(e);if(btn)btn.disabled=false;}
}

    ${tabs.map(t=>`<button onclick="setComptaTab('${t.k}')" style="flex:1;background:${comptaTab===t.k?'var(--accent)':'var(--surface)'};color:${comptaTab===t.k?'#fff':'var(--muted)'};border:1px solid ${comptaTab===t.k?'var(--accent)':'var(--border)'};border-radius:8px;padding:8px 4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer">${t.icon} ${t.lbl}</button>`).join('')}
  </div>`;
  c.innerHTML=subNav+'<div id="compta-inner"></div>';
  const inner=document.getElementById('compta-inner');
  if(comptaTab==='journal')renderJournal(inner);
  else if(comptaTab==='annuel')renderAnnuel(inner);
  else if(comptaTab==='bilan')renderBilan(inner);
}

/* ACTIONS                            */
/* ═══════════════════════════════════ */
async function delRec(id){
  if(!confirm('Supprimer ?'))return;
  try{await sbDelete('recettes',id);recettes=recettes.filter(r=>r.id!==id);showToast('Supprimé');render();}
  catch(e){showToast('Erreur suppression','err');}
}
async function delAchat(id){
  if(!confirm('Supprimer cet achat ?'))return;
  try{await sbDelete('achats',id);achats=achats.filter(a=>a.id!==id);showToast('Achat supprimé');render();}
  catch(e){showToast('Erreur suppression','err');}
}

async function addAchat(){
  const date=document.getElementById('a-date')?.value||achatForm.date;
  const desc=document.getElementById('a-desc')?.value||achatForm.desc;
  const amount=document.getElementById('a-amt')?.value||achatForm.amount;
  const cat=document.getElementById('a-cat')?.value||achatForm.cat;
  const facture=document.getElementById('a-fac')?.value||achatForm.facture;
  if(!date||!amount){showToast('Date et montant requis','err');return;}
  const amt=parseFloat(amount);
  if(isNaN(amt)||amt<=0){showToast('Montant invalide','err');return;}
  try{
    const rows=await sbInsert('achats',{date,description:desc,montant:amt,categorie:cat,fournisseur:'',facture:facture||null});
    const r=rows[0];
    achats.push({id:r.id,date:r.date,desc:r.description,amount:parseFloat(r.montant),cat:r.categorie||'Autre',facture:r.facture||''});
    achatForm={date,desc:'',amount:'',cat,facture:''};
    showToast('-'+amt.toFixed(2)+' € enregistré ✓');render();
  }catch(e){showToast('Erreur sauvegarde','err');console.error(e);}
}

function saveSet(){
  ['nom','gerant','siret','codeape','activite','adresse'].forEach(k=>{const el=document.getElementById('s-'+k);if(el)settings[k]=el.value;});
  const p=document.getElementById('s-peri');if(p)settings.periodicite=p.value;
  const r=document.getElementById('s-reg');if(r)settings.regime=r.value;
  saveCfg();updateAlerts();showToast('Paramètres sauvegardés ✓');render();
}

function exportCSV(type){
  const data=type==='month'?getMonthRecs(filterYear,filterMonth):getYearRecs(filterYear);
  const period=type==='month'?MOIS[filterMonth]+'_'+filterYear:''+filterYear;
  const header='Date;N° Facture;Activité;Libellé;Mode paiement;Crédit;Solde\n';
  let solde=0;
  const rows=[...data].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
    solde+=r.amount;const a=getAct(r.activite),p=getPay(r.paiement||'cb');
    return`${r.date};${r.facture||''};${a.label};${r.desc};${p.label};${r.amount.toFixed(2).replace('.',',')};${solde.toFixed(2).replace('.',',')}`;}).join('\n');
  const total=sum(data),co=cotisArr(data);
  // Achats
  const acData=type==='month'?getMonthAchats(filterYear,filterMonth):getYearAchats(filterYear);
  const acRows='\n\nACHATS / CHARGES\nDate;N° Facture;Catégorie;Libellé;Montant\n'+[...acData].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>`${r.date};${r.facture||''};${r.cat};${r.desc};${r.amount.toFixed(2).replace('.',',')}`).join('\n');
  const blob=new Blob(['\uFEFF'+header+rows+`\n;;TOTAL RECETTES;;;;${total.toFixed(2).replace('.',',')};${total.toFixed(2).replace('.',',')}\n;;Cotisations (URSSAF);;;${co.toFixed(2).replace('.',',')};;`+acRows],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`CSCAR_${period}.csv`;a.click();
  showToast('CSV téléchargé ✓');
}
