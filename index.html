function isoToday(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function parseDate(s){if(!s)return new Date();var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function fmtDate(s){return parseDate(s).toLocaleDateString('fr-FR');}
function fmtDateLong(s){return parseDate(s).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});}
function sum(arr){return arr.reduce(function(s,r){return s+r.amount;},0);}
function sumAct(arr,k){return arr.filter(function(r){return r.activite===k;}).reduce(function(s,r){return s+r.amount;},0);}
function getAct(k){return ACTS.find(function(a){return a.key===k;})||ACTS[0];}
function getPay(k){return PAYS.find(function(p){return p.key===k;})||PAYS[0];}
function getMR(y,m){return recettes.filter(function(r){var d=parseDate(r.date);return d.getFullYear()===y&&d.getMonth()===m;});}
function getYR(y){return recettes.filter(function(r){return parseDate(r.date).getFullYear()===y;});}
function getMA(y,m){return achats.filter(function(r){var d=parseDate(r.date);return d.getFullYear()===y&&d.getMonth()===m;});}
function getYA(y){return achats.filter(function(r){return parseDate(r.date).getFullYear()===y;});}
function getTR(){return recettes.filter(function(r){return r.date===isoToday();});}
function getYears(){var s=new Set([CY]);recettes.forEach(function(r){s.add(parseDate(r.date).getFullYear());});achats.forEach(function(r){s.add(parseDate(r.date).getFullYear());});return Array.from(s).sort(function(a,b){return b-a;});}
function yopts(yrs){return yrs.map(function(y){return '<option value="'+y+'"'+(y===filterYear?' selected':'')+'>'+y+'</option>';}).join('');}
function mopts(){return MOIS.map(function(m,i){return '<option value="'+i+'"'+(i===filterMonth?' selected':'')+'>'+m+'</option>';}).join('');}
function sCls(s){return s==='regle'?'sr':s==='echelonne'?'se':'si';}
function sLbl(s){return s==='regle'?'Regle':s==='echelonne'?'Echelonne':'Non regle';}

function showToast(msg,type){

  t.textContent=msg;
  setTimeout(function(){t.style.opacity='0';},2500);
}

function load(){
  try{var th=localStorage.getItem('cscar_theme');if(th){theme=th;document.documentElement.setAttribute('data-theme',th);var tb=document.getElementById('theme-btn');if(tb)tb.innerHTML=th==='light'?'&#127769;':'&#9728;';}}catch(e){}

    recettes=res[0].map(function(r){return{id:r.id,date:r.date,desc:r.description||'',amount:parseFloat(r.montant)||0,activite:r.activite||'lavage',paiement:r.paiement||'cb',facture:r.facture||'',statut:r.statut||'regle',date_reglement:r.date_reglement||'',mode_reglement:r.mode_reglement||'',nb_echeances:r.nb_echeances||null,echeances:r.echeances||null};});
    achats=res[1].map(function(r){return{id:r.id,date:r.date,desc:r.description||'',amount:parseFloat(r.montant)||0,cat:r.categorie||'Autre',facture:r.facture||'',statut:r.statut||'impaye',date_reglement:r.date_reglement||'',mode_reglement:r.mode_reglement||'',nb_echeances:r.nb_echeances||null,echeances:r.echeances||null};});
    showToast('Données chargées ✓');
    updateAlerts();
    render();
  }).catch(function(e){
    showToast('Erreur connexion','err');

  });
}
function saveCfg(){try{localStorage.setItem('cscar_cfg',JSON.stringify(settings));}catch(e){}}

function getEcheances(){
  var y=CY,today=new Date(),ech=[];
  function add(ds,title,desc,url){
    var d=parseDate(ds),diff=Math.round((d-today)/86400000);
    var status='ok',label='A venir';
    if(diff<0){status='past';label='Passee';}
    else if(diff<=7){status='urgent';label='Urgent '+diff+'j';}
    else if(diff<=30){status='soon';label='Bientot '+diff+'j';}
    ech.push({d:d,ds:ds,title:title,desc:desc,url:url,status:status,label:label});
  }
  add(y+'-04-30','URSSAF T1 dirigeant','Cotisations sociales T1\nSeulement si tu te verses un salaire','https://www.urssaf.fr');
  add(y+'-07-31','URSSAF T2 dirigeant','Cotisations sociales T2','https://www.urssaf.fr');
  add(y+'-10-31','URSSAF T3 dirigeant','Cotisations sociales T3','https://www.urssaf.fr');
  add((y+1)+'-01-31','URSSAF T4 dirigeant','Cotisations sociales T4','https://www.urssaf.fr');
  add(y+'-05-31','Liasse fiscale','Depot liasse fiscale + comptes annuels\nA faire avec ton comptable','https://www.impots.gouv.fr');
  add(y+'-06-30','Assemblee Generale','AG annuelle obligatoire SASU\nApprobation des comptes','https://www.inpi.fr');
  add(y+'-09-15','Acompte IS','Acompte Impot sur les Societes\nSi IS > 3000 EUR l an dernier','https://www.impots.gouv.fr');
  add(y+'-12-15','CFE','Cotisation Fonciere des Entreprises','https://www.impots.gouv.fr');
  add(y+'-12-15','Solde IS','Solde Impot sur les Societes','https://www.impots.gouv.fr');
  return ech.sort(function(a,b){return a.d-b.d;});
}
function updateAlerts(){
  var alertes=getEcheances().filter(function(e){return e.status==='urgent'||e.status==='soon';});
  var badge=document.getElementById('alert-badge');
  var banner=document.getElementById('alert-banner');
  if(!badge||!banner)return;
  if(alertes.length){
    badge.style.display='block';badge.textContent='Alertes '+alertes.length;
    banner.style.display='flex';
    banner.innerHTML=alertes.map(function(a){
      var bg=a.status==='urgent'?'var(--rb)':'var(--yb)';
      var co=a.status==='urgent'?'var(--rd)':'var(--gd)';
      var bo=a.status==='urgent'?'var(--rbo)':'var(--ybo)';
      return '<span class="apill" style="background:'+bg+';color:'+co+';border:1px solid '+bo+'">'+a.title+' - '+a.label+'</span>';
    }).join('');
  }else{badge.style.display='none';banner.style.display='none';}
}

function setSection(s){
  section=s;
  document.querySelectorAll('nav button').forEach(function(b){b.classList.remove('active');});
  var navSections=['tpv','achats','annuaire','compta'];
  if(navSections.indexOf(s)>=0){var nb=document.getElementById('nav-'+s);if(nb)nb.classList.add('active');}
  render();
}

function render(){
  var c=document.getElementById('content');
  if(!c)return;
  if(section==='tpv')renderTPV(c);
  else if(section==='achats')renderAchats(c);
  else if(section==='annuaire')renderAnnuaire(c);
  else if(section==='compta'||section==='journal'||section==='annuel'||section==='bilan'||section==='alertes'||section==='impaye')renderCompta(c);
  else if(section==='settings')renderSettings(c);
  else renderTPV(c);
}

  return '<div class="ji"><div class="jl"><span class="jb jbx">'+r.cat+'</span><div class="jinfo"><div class="jd">'+(r.desc||'---')+'</div><div class="jm"><span>'+fmtDate(r.date)+'</span>'+(r.facture?'<span>#'+r.facture+'</span>':'')+'</div></div></div><div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0"><span class="ja" style="color:var(--rd)">-'+r.amount.toFixed(2)+' EUR</span><span class="sbdg '+sCls(r.statut||'impaye')+'">'+sLbl(r.statut||'impaye')+'</span><div style="display:flex;gap:4px"><button class="ebt" onclick="openEditA('+r.id+')">Edit</button><button class="dbt" onclick="delA('+r.id+')">X</button></div></div></div>';

function renderTPV(c){
  var a=getAct(tpvAct),p=getPay(tpvPay);
  var amtNum=parseFloat(tpvAmt)||0;
  var tr=getTR(),mt=sum(getMR(CY,CM));
  var as=ACTS.map(function(act){return '<button class="abtn '+act.ac+(tpvAct===act.key?' sel':'')+'" onclick="selAct(\''+act.key+'\')" ><span class="ai">'+act.ico+'</span><span class="an">'+act.lbl+'</span></button>';}).join('');
  var ps=PAYS.map(function(pay){return '<button class="pbtn'+(tpvPay===pay.key?' sel':'')+'" onclick="selPay(\''+pay.key+'\')" ><span class="pico">'+pay.ico+'</span><span class="plbl">'+pay.lbl+'</span></button>';}).join('');
  var mr=[].concat(getMR(CY,CM)).sort(function(a,b){return b.date.localeCompare(a.date);});
  var cl=clients.map(function(cl){return '<option value="'+cl.nom+'">';}).join('');
  var imp=recettes.filter(function(r){return r.statut==='impaye'||r.statut==='echelonne';});
  var astyle='background:'+a.col+'22;color:'+a.col+';border:1px solid '+a.col+'44';
  c.innerHTML='<div class="tpv"><div class="cards c2" style="padding:0;margin-bottom:12px"><div class="card"><div class="cl">Aujourd\'hui</div><div class="cv" style="color:var(--gn)">'+sum(tr).toFixed(2)+' EUR</div></div><div class="card"><div class="cl">'+MOISC[CM]+'</div><div class="cv" style="color:var(--ac)">'+mt.toFixed(2)+' EUR</div></div></div>'+(imp.length?'<div style="background:var(--rb);border:1px solid var(--rbo);border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:.74rem;color:var(--rd);cursor:pointer" onclick="setSection(\'impaye\')">'+imp.length+' encaissement(s) en attente</div>':'')+'<div class="slbl">Activite</div><div class="abtns">'+as+'</div><div class="tdp"><div class="tdl">Montant a encaisser</div><div class="tamt '+(amtNum>0?'has':'mt')+'" id="tamt">'+(amtNum>0?tpvAmt.replace('.',','):'0,00')+'<span class="eur">EUR</span></div><div class="tmeta"><span class="tbdg" id="tact" style="'+astyle+'">'+a.ico+' '+a.lbl+'</span><span class="tpbdg" id="tpay">'+p.ico+' '+p.lbl+'</span><span class="tdsc" id="tdsc">'+(tpvDesc||'Description...')+'</span></div></div><div class="kpad"><button class="key" onclick="kp(\'7\')">7</button><button class="key" onclick="kp(\'8\')">8</button><button class="key" onclick="kp(\'9\')">9</button><button class="key" onclick="kp(\'4\')">4</button><button class="key" onclick="kp(\'5\')">5</button><button class="key" onclick="kp(\'6\')">6</button><button class="key" onclick="kp(\'1\')">1</button><button class="key" onclick="kp(\'2\')">2</button><button class="key" onclick="kp(\'3\')">3</button><button class="key k0" onclick="kp(\'0\')">0</button><button class="key" onclick="kp(\'.\')">.</button><button class="key kdel" onclick="kd()">&#x232B;</button></div><div class="slbl">Mode de paiement</div><div class="pbtns">'+ps+'</div><datalist id="cll">'+cl+'</datalist><div class="tfs" style="grid-template-columns:1fr 1fr 1fr"><div class="tf" style="grid-column:span 2"><label>Description / Client</label><input type="text" id="f-desc" value="'+tpvDesc+'" placeholder="Nom client..." list="cll" oninput="tpvDesc=this.value;updDisp()"></div><div class="tf"><label>Date</label><input type="date" id="f-date" value="'+tpvDate+'" onchange="tpvDate=this.value"></div></div><div class="tfs" style="grid-template-columns:1fr 1fr;margin-bottom:14px"><div class="tf"><label>N Facture (opt)</label><input type="text" id="f-fac" value="'+tpvFac+'" placeholder="FA-2026-001" oninput="tpvFac=this.value"></div><div class="tf" style="justify-content:flex-end"><button class="benc" onclick="encaisser()" id="btn-enc"'+(amtNum<=0?' disabled':'')+'> Encaisser'+(amtNum>0?' - '+amtNum.toFixed(2)+' EUR':'')+'</button></div></div>'+(mr.length?'<div class="slbl" style="margin-bottom:8px">Encaissements '+MOISC[CM]+' ('+mr.length+')</div><div class="jlist">'+mr.slice(0,5).map(jItemR).join('')+(mr.length>5?'<div style="text-align:center;font-size:.7rem;color:var(--mu);padding:6px 0;cursor:pointer" onclick="setSection(\'journal\')">+'+(mr.length-5)+' -> Journal</div>':'')+'</div>':'')+'</div>';
}

function updDisp(){
  var amtNum=parseFloat(tpvAmt)||0;
  var d=document.getElementById('tamt');
  if(d){d.className='tamt '+(amtNum>0?'has':'mt');d.innerHTML=(amtNum>0?tpvAmt.replace('.',','):'0,00')+'<span class="eur">EUR</span>';}
  var dd=document.getElementById('tdsc');if(dd)dd.textContent=tpvDesc||'Description...';
  var btn=document.getElementById('btn-enc');if(btn){btn.disabled=amtNum<=0;btn.textContent='Encaisser'+(amtNum>0?' - '+amtNum.toFixed(2)+' EUR':'');}
}
function kp(k){
  if(k==='.'){if(tpvAmt.indexOf('.')>=0)return;if(!tpvAmt)tpvAmt='0';tpvAmt+='.';}
  else{if(tpvAmt.indexOf('.')>=0&&tpvAmt.split('.')[1].length>=2)return;if(tpvAmt==='0')tpvAmt=k;else tpvAmt+=k;if(tpvAmt.length>9)return;}
  updDisp();
}
function kd(){tpvAmt=tpvAmt.slice(0,-1);updDisp();}
function selAct(k){tpvAct=k;render();}
function selPay(k){tpvPay=k;render();}

function encaisser(){
  var amt=parseFloat(tpvAmt);
  if(isNaN(amt)||amt<=0){showToast('Montant invalide','err');return;}
  var btn=document.getElementById('btn-enc');if(btn)btn.disabled=true;
  sbIns('recettes',{date:tpvDate,description:tpvDesc||getAct(tpvAct).lbl,montant:amt,activite:tpvAct,paiement:tpvPay,facture:tpvFac||null,statut:'regle'}).then(function(rows){
    var r=rows[0];
    recettes.push({id:r.id,date:r.date,desc:r.description,amount:parseFloat(r.montant),activite:r.activite,paiement:r.paiement,facture:r.facture||'',statut:r.statut||'regle',date_reglement:'',mode_reglement:'',nb_echeances:null,echeances:null});
    tpvAmt='';tpvDesc='';tpvFac='';
    showToast('+'+amt.toFixed(2)+' EUR encaisse');render();
  }).catch(function(e){showToast('Erreur sauvegarde','err');console.error(e);if(btn)btn.disabled=false;});
}

function renderAchats(c){

function addAchat(){
  var date=document.getElementById('a-date').value||aForm.date;
  var desc=document.getElementById('a-desc').value||aForm.desc;
  var amt=document.getElementById('a-amt').value||aForm.amt;
  var cat=document.getElementById('a-cat').value||aForm.cat;
  var fac=document.getElementById('a-fac').value||aForm.fac;
  if(!date||!amt){showToast('Date et montant requis','err');return;}
  var amount=parseFloat(amt);
  if(isNaN(amount)||amount<=0){showToast('Montant invalide','err');return;}
  sbIns('achats',{date:date,description:desc,montant:amount,categorie:cat,facture:fac||null,statut:'impaye'}).then(function(rows){
    var r=rows[0];
    achats.push({id:r.id,date:r.date,desc:r.description,amount:parseFloat(r.montant),cat:r.categorie||'Autre',facture:r.facture||'',statut:r.statut||'impaye',date_reglement:'',mode_reglement:'',nb_echeances:null,echeances:null});
    aForm={date:date,desc:'',amt:'',cat:cat,fac:''};
    showToast('-'+amount.toFixed(2)+' EUR enregistre');render();
  }).catch(function(e){showToast('Erreur sauvegarde','err');console.error(e);});
}

function modalBody(r,type,st){
  var isR=type==='rec';
  return '<div class="fg" style="margin-bottom:10px"><div class="fi"><label>Date</label><input type="date" id="e-date" value="'+r.date+'"></div><div class="fi"><label>Montant (EUR)</label><input type="number" id="e-amt" value="'+r.amount+'" step="0.01"></div><div class="fi" style="grid-column:span 2"><label>Description</label><input type="text" id="e-desc" value="'+(r.desc||'')+'"></div>'+(isR?'<div class="fi"><label>Activite</label><select id="e-act">'+ACTS.map(function(a){return '<option value="'+a.key+'"'+(r.activite===a.key?' selected':'')+'>'+a.lbl+'</option>';}).join('')+'</select></div>':'<div class="fi"><label>Categorie</label><select id="e-cat">'+CATS.map(function(cat){return '<option'+(r.cat===cat?' selected':'')+'>'+cat+'</option>';}).join('')+'</select></div>')+'<div class="fi"><label>N Facture</label><input type="text" id="e-fac" value="'+(r.facture||'')+'"></div></div><div class="fi" style="margin-bottom:8px"><label>Statut paiement</label></div><div class="stbtns"><button class="stbtn'+(st==='regle'?' ssr':'')+'" onclick="selSt(\''+type+'\',\'regle\')">Regle</button><button class="stbtn'+(st==='echelonne'?' sse':'')+'" onclick="selSt(\''+type+'\',\'echelonne\')">Echelonne</button><button class="stbtn'+(st==='impaye'?' ssi':'')+'" onclick="selSt(\''+type+'\',\'impaye\')">Non regle</button></div><div id="st-extra">'+stExtra(st,r)+'</div>';
}
function stExtra(st,r){
  if(st==='regle')return '<div class="fg"><div class="fi"><label>Date reglement</label><input type="date" id="e-dreg" value="'+(r.date_reglement||'')+'"></div><div class="fi"><label>Mode</label><select id="e-mreg"><option value="">Non precise</option>'+PAYS.map(function(p){return '<option value="'+p.key+'"'+(r.mode_reglement===p.key?' selected':'')+'>'+p.lbl+'</option>';}).join('')+'</select></div></div>';
  if(st==='echelonne'){
    var nb=r.nb_echeances||2;
    var echs=r.echeances||Array.from({length:nb},function(){return {date:'',montant:'',cheque:''};});
    return '<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><label style="font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);font-weight:700">Nb echeances</label><div style="display:flex;align-items:center;gap:8px"><button onclick="chgNb(-1)" style="background:var(--sf2);border:1px solid var(--bd);border-radius:6px;width:28px;height:28px;cursor:pointer;color:var(--tx)">-</button><span id="nb-val" style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:1.1rem;min-width:20px;text-align:center">'+nb+'</span><button onclick="chgNb(1)" style="background:var(--sf2);border:1px solid var(--bd);border-radius:6px;width:28px;height:28px;cursor:pointer;color:var(--tx)">+</button></div></div><div id="ech-lines">'+echLines(echs)+'</div></div>';
  }
  if(st==='impaye')return '<div class="fi" style="margin-top:8px"><label>Date echeance prevue</label><input type="date" id="e-dech" value="'+(r.date_echeance||r.date_reglement||'')+'"></div>';
  return '';
}
function echLines(echs){
  return echs.map(function(e,i){return '<div style="background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px"><div style="font-family:Barlow Condensed,sans-serif;font-size:.68rem;font-weight:700;letter-spacing:1px;color:var(--ac);margin-bottom:8px">ECHEANCE '+(i+1)+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px"><div class="fi"><label>Date</label><input type="date" id="ed-'+i+'" value="'+(e.date||'')+'"></div><div class="fi"><label>Montant EUR</label><input type="number" id="em-'+i+'" value="'+(e.montant||'')+'" step="0.01" placeholder="0.00"></div></div><div class="fi"><label>N Cheque</label><input type="text" id="ec-'+i+'" value="'+(e.cheque||'')+'" placeholder="CHQ-XXXXXX"></div></div>';}).join('');
}
function selSt(type,st){
  editObj.statut=st;
  var btns=document.querySelectorAll('.stbtn');
  btns.forEach(function(b){b.className='stbtn';});
  var cls={regle:'ssr',echelonne:'sse',impaye:'ssi'};
  var idx={regle:0,echelonne:1,impaye:2}[st];
  if(btns[idx])btns[idx].classList.add(cls[st]);
  var ex=document.getElementById('st-extra');
  if(ex)ex.innerHTML=stExtra(st,editObj);
}
function chgNb(d){
  var v=document.getElementById('nb-val');if(!v)return;
  var nb=parseInt(v.textContent)+d;if(nb<2)nb=2;if(nb>36)nb=36;
  v.textContent=nb;editObj.nb_echeances=nb;
  var ex=editObj.echeances||[];
  editObj.echeances=Array.from({length:nb},function(_,i){return ex[i]||{date:'',montant:'',cheque:''};});
  var lines=document.getElementById('ech-lines');if(lines)lines.innerHTML=echLines(editObj.echeances);
}
function collectExtra(st){
  var out={statut:st};
  if(st==='regle'){out.date_reglement=document.getElementById('e-dreg').value||'';out.mode_reglement=document.getElementById('e-mreg').value||'';}
  else if(st==='echelonne'){var nb=parseInt(document.getElementById('nb-val').textContent||2);out.nb_echeances=nb;out.echeances=Array.from({length:nb},function(_,i){return{date:document.getElementById('ed-'+i).value||'',montant:parseFloat(document.getElementById('em-'+i).value)||0,cheque:document.getElementById('ec-'+i).value||''};});}
  else if(st==='impaye'){out.date_echeance=document.getElementById('e-dech').value||'';}
  return out;
}
function saveEdit(){
  var date=document.getElementById('e-date').value;
  var amt=parseFloat(document.getElementById('e-amt').value);
  var desc=document.getElementById('e-desc').value||'';
  var fac=document.getElementById('e-fac').value||'';
  if(!date||isNaN(amt)){showToast('Donnees invalides','err');return;}
  var extra=collectExtra(editObj.statut||(editType==='rec'?'regle':'impaye'));
  if(editType==='rec'){
    var act=document.getElementById('e-act').value||editObj.activite;
    sbUpd('recettes',editId,{date:date,description:desc,montant:amt,activite:act,facture:fac||null,statut:extra.statut,date_reglement:extra.date_reglement||null,mode_reglement:extra.mode_reglement||null,nb_echeances:extra.nb_echeances||null,echeances:extra.echeances||null,date_echeance:extra.date_echeance||null}).then(function(){
      var idx=recettes.findIndex(function(r){return r.id===editId;});
      if(idx>=0)recettes[idx]=Object.assign(recettes[idx],{date:date,desc:desc,amount:amt,activite:act,facture:fac},extra);
      showToast('Modifie');closeModal();render();
    }).catch(function(e){showToast('Erreur','err');console.error(e);});
  }else{
    var cat=document.getElementById('e-cat').value||editObj.cat;
    sbUpd('achats',editId,{date:date,description:desc,montant:amt,categorie:cat,facture:fac||null,statut:extra.statut,date_reglement:extra.date_reglement||null,mode_reglement:extra.mode_reglement||null,nb_echeances:extra.nb_echeances||null,echeances:extra.echeances||null,date_echeance:extra.date_echeance||null}).then(function(){
      var idx=achats.findIndex(function(r){return r.id===editId;});
      if(idx>=0)achats[idx]=Object.assign(achats[idx],{date:date,desc:desc,amount:amt,cat:cat,facture:fac},extra);
      showToast('Modifie');closeModal();render();
    }).catch(function(e){showToast('Erreur','err');console.error(e);});
  }
}
function delR(id){if(!confirm('Supprimer ?'))return;sbDel('recettes',id).then(function(){recettes=recettes.filter(function(r){return r.id!==id;});showToast('Supprime');render();}).catch(function(e){showToast('Erreur','err');});}
function delA(id){if(!confirm('Supprimer ?'))return;sbDel('achats',id).then(function(){achats=achats.filter(function(a){return a.id!==id;});showToast('Supprime');render();}).catch(function(e){showToast('Erreur','err');});}

function toggleTheme(){theme=theme==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',theme);document.getElementById('theme-btn').innerHTML=theme==='light'?'&#127769;':'&#9728;';localStorage.setItem('cscar_theme',theme);}

function exportCSV(type){
  var data=type==='month'?getMR(filterYear,filterMonth):getYR(filterYear);
  var acData=type==='month'?getMA(filterYear,filterMonth):getYA(filterYear);
  var period=type==='month'?MOIS[filterMonth]+'_'+filterYear:''+filterYear;
  var header='Date;N Facture;Compte;Activite;Libelle;Mode paiement;Credit;Solde\n';
  var solde=0;
  var rows=[].concat(data).sort(function(a,b){return a.date.localeCompare(b.date);}).map(function(r){solde+=r.amount;var a=getAct(r.activite),p=getPay(r.paiement||'cb');return r.date+';'+(r.facture||'')+';'+a.cpt+';'+a.lbl+';'+r.desc+';'+p.lbl+';'+r.amount.toFixed(2).replace('.',',')+';'+solde.toFixed(2).replace(',','.');}).join('\n');
  var achRows='\n\nACHATS\nDate;N Facture;Categorie;Libelle;Montant\n'+[].concat(acData).sort(function(a,b){return a.date.localeCompare(b.date);}).map(function(r){return r.date+';'+(r.facture||'')+';'+r.cat+';'+r.desc+';'+r.amount.toFixed(2).replace('.',',');}).join('\n');
  var blob=new Blob(['\uFEFF'+header+rows+achRows],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='CSCAR_'+period+'.csv';a.click();
  showToast('CSV exporte');
}
function exportPDF(type){
  var data=type==='month'?getMR(filterYear,filterMonth):getYR(filterYear);
  var acData=type==='month'?getMA(filterYear,filterMonth):getYA(filterYear);
  var period=type==='month'?MOIS[filterMonth]+' '+filterYear:'Annee '+filterYear;
  var total=sum(data),achTotal=sum(acData),res=total-achTotal;
  var today=new Date().toLocaleDateString('fr-FR');
  var solde=0;
  var rows=[].concat(data).sort(function(a,b){return a.date.localeCompare(b.date);}).map(function(r){solde+=r.amount;var a=getAct(r.activite),p=getPay(r.paiement||'cb');return '<tr><td>'+fmtDate(r.date)+'</td><td>'+(r.facture||'---')+'</td><td style="font-size:9px;font-weight:700;color:'+a.col+'">'+a.lbl+'</td><td style="font-size:9px;color:#888">'+a.cpt+'</td><td>'+r.desc+'</td><td style="font-size:9px">'+p.lbl+'</td><td class="r" style="color:#16a34a;font-weight:700">'+r.amount.toFixed(2)+' EUR</td><td class="r">'+solde.toFixed(2)+' EUR</td></tr>';}).join('');
  var achRows=[].concat(acData).sort(function(a,b){return a.date.localeCompare(b.date);}).map(function(r){return '<tr><td>'+fmtDate(r.date)+'</td><td>'+(r.facture||'---')+'</td><td>'+r.cat+'</td><td>'+r.desc+'</td><td class="r" style="color:#dc2626;font-weight:700">-'+r.amount.toFixed(2)+' EUR</td></tr>';}).join('');
  var html='<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Bilan CSCAR '+period+'</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:11px;color:#111;padding:22px}.hdr{border-bottom:3px solid #1a56db;padding-bottom:14px;margin-bottom:16px;display:flex;justify-content:space-between}.brand{font-size:26px;font-weight:900;letter-spacing:3px}.tagline{font-size:9px;color:#1a56db;font-weight:700;letter-spacing:3px;text-transform:uppercase}.info{display:grid;grid-template-columns:1fr 1fr;gap:3px 20px;font-size:10px;margin-bottom:14px;background:#f5f6f8;padding:10px;border-radius:4px}.info span{color:#888}.period{font-size:13px;font-weight:700;color:#1a56db;letter-spacing:2px;margin-bottom:10px;border-left:4px solid #f5c518;padding-left:8px;text-transform:uppercase}table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:10px}thead tr{background:#111827;color:white}th{padding:7px 8px;text-align:left;font-size:9px;letter-spacing:1.5px;text-transform:uppercase}tbody tr{border-bottom:1px solid #eee}tbody tr:nth-child(even){background:#fafafa}td{padding:6px 8px}.r{text-align:right}tfoot tr{background:#f0f2f5;font-weight:700}tfoot td{padding:8px}.sum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.sc{border:1.5px solid #eee;border-radius:6px;padding:9px;text-align:center}.sl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:3px}.sv{font-size:16px;font-weight:700}.footer{font-size:9px;color:#aaa;border-top:1px solid #eee;padding-top:10px;margin-top:14px}</style></head><body><div class="hdr"><div><div class="brand">CSCAR</div><div class="tagline">SASU - Gestion et Comptabilite</div></div><div style="text-align:right;font-size:10px;color:#888">Etabli le '+today+'</div></div><div class="info"><div><span>Entreprise : </span><strong>'+settings.nom+'</strong></div><div><span>President : </span><strong>'+(settings.gerant||'---')+'</strong></div><div><span>SIRET : </span><strong>'+(settings.siret||'---')+'</strong></div><div><span>Forme : </span><strong>SASU</strong></div><div><span>Activite : </span><strong>'+(settings.activite||'---')+'</strong></div><div><span>Exercice : </span><strong>01/01/'+filterYear+' - 31/12/'+filterYear+'</strong></div></div><div class="period">'+period+'</div><table><thead><tr><th>Date</th><th>N Facture</th><th>Activite</th><th>Compte</th><th>Libelle</th><th>Paiement</th><th class="r">Montant</th><th class="r">Solde</th></tr></thead><tbody>'+(rows||'<tr><td colspan="8" style="text-align:center;color:#aaa;padding:16px">Aucune recette</td></tr>')+'</tbody><tfoot><tr><td colspan="6"><strong>TOTAL RECETTES</strong></td><td class="r" style="color:#16a34a"><strong>'+total.toFixed(2)+' EUR</strong></td><td></td></tr></tfoot></table><div class="sum"><div class="sc"><div class="sl">CA Total</div><div class="sv" style="color:#16a34a">'+total.toFixed(2)+' EUR</div></div><div class="sc"><div class="sl">Achats</div><div class="sv" style="color:#dc2626">-'+achTotal.toFixed(2)+' EUR</div></div><div class="sc"><div class="sl">Resultat brut</div><div class="sv" style="color:#1a56db">'+res.toFixed(2)+' EUR</div></div></div>'+(achRows?'<table><thead><tr><th>Date</th><th>N Facture</th><th>Categorie</th><th>Libelle</th><th class="r">Montant</th></tr></thead><tbody>'+achRows+'</tbody><tfoot><tr><td colspan="4"><strong>TOTAL ACHATS</strong></td><td class="r" style="color:#dc2626"><strong>-'+achTotal.toFixed(2)+' EUR</strong></td></tr></tfoot></table>':'')+'<div class="footer">CSCAR Gestion SASU - Document indicatif, non certifie comptable - Genere le '+today+'</div></body></html>';
  var w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(function(){w.print();},400);
  showToast('PDF genere');
}

document.getElementById('today-lbl').textContent=now.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
setSection('tpv');
load();
