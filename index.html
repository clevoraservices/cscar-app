<!DOCTYPE html>

<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>CSCAR — Gestion SASU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════ THEMES ═══════════ */
[data-theme="light"]{
  --bg:#f0f2f6;--surface:#ffffff;--surface2:#f5f6f9;--border:#e0e4ec;--border2:#c5ccd8;
  --text:#111827;--text2:#374151;--muted:#6b7280;--muted2:#9ca3af;
  --shadow:0 1px 3px rgba(0,0,0,0.07);--shadow-md:0 4px 16px rgba(0,0,0,0.10);
  --header:#ffffff;--nav:#ffffff;--key:#ffffff;--key-border:#e0e4ec;
  --display:#1a1f2e;--disp-amt:#f5c518;--disp-empty:#3a4252;--disp-meta:#8892a4;
  --acc-bg:#eef3ff;--acc-border:#c7d7f8;--acc-fg:#1e3a8a;
  --grn-bg:#f0fdf4;--grn-border:#bbf7d0;
  --red-bg:#fef2f2;--red-border:#fecaca;
  --gld-bg:#fffbeb;--gld-border:#fde68a;
}
[data-theme="dark"]{
  --bg:#0c0f14;--surface:#161b24;--surface2:#1d2330;--border:#252d3a;--border2:#313d4f;
  --text:#edf0f6;--text2:#c5ccd8;--muted:#5a6478;--muted2:#8490a4;
  --shadow:0 1px 3px rgba(0,0,0,0.3);--shadow-md:0 4px 16px rgba(0,0,0,0.4);
  --header:#111520;--nav:#111520;--key:#1d2330;--key-border:#252d3a;
  --display:#090c12;--disp-amt:#f5c518;--disp-empty:#2a3042;--disp-meta:#5a6478;
  --acc-bg:#0d1e40;--acc-border:#1e3d6e;--acc-fg:#93c5fd;
  --grn-bg:#0a1f10;--grn-border:#14532d;
  --red-bg:#200a0a;--red-border:#3d1010;
  --gld-bg:#1a1000;--gld-border:#3d2800;
}
:root{
  --accent:#1a56db;--green:#16a34a;--red:#dc2626;--gold:#d97706;
  --blue:#3b82f6;--purple:#8b5cf6;--orange:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;transition:background .2s,color .2s}
.app{display:flex;flex-direction:column;min-height:100dvh;width:100%;background:var(--bg)}

/* ═══════════ HEADER ═══════════ */
header{background:var(–header);padding:10px 14px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(–shadow)}
.logo-wrap{display:flex;align-items:center;gap:9px}
.brand{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.4rem;letter-spacing:3px;line-height:1}
.tagline{font-size:0.5rem;letter-spacing:2.5px;color:var(–accent);text-transform:uppercase;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:7px}
.icon-btn{background:var(–surface2);border:1px solid var(–border);border-radius:20px;padding:4px 10px;font-size:0.8rem;cursor:pointer;color:var(–muted);transition:all .2s;line-height:1}
.icon-btn:hover{border-color:var(–accent);color:var(–accent)}
.badge-alert{background:var(–red);color:#fff;border-radius:20px;padding:3px 9px;font-size:0.63rem;font-weight:800;cursor:pointer;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:1px}
.today-lbl{font-size:0.58rem;color:var(–muted);letter-spacing:1px;text-transform:uppercase}
.saving{font-size:0.7rem;color:var(–green);display:none}
.alert-banner{background:var(–gld-bg);border-bottom:1px solid var(–gld-border);padding:6px 14px;display:flex;gap:6px;flex-wrap:wrap}
.alert-pill{border-radius:4px;padding:3px 9px;font-size:0.65rem;font-weight:800;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:1px}

/* ═══════════ NAV ═══════════ */
nav{position:fixed;bottom:0;left:0;right:0;background:var(–nav);border-top:2px solid var(–accent);display:flex;z-index:999;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
nav button{flex:1;background:none;border:none;color:var(–muted2);padding:8px 0 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:color .2s;min-width:0;overflow:hidden}
nav button.active{color:var(–accent)}
.nav-ico{font-size:1.15rem;line-height:1}
.nav-lbl{font-size:0.52rem;letter-spacing:.3px;text-transform:uppercase;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;white-space:nowrap}

/* ═══════════ CONTENT ═══════════ */
.content{flex:1;overflow-y:auto;padding:0 0 72px}
.pad{padding:0 14px}
.spacer{height:16px}
.section-hdr{padding:14px 14px 2px}
.section-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:2px;text-transform:uppercase;line-height:1}
.section-sub{font-size:0.7rem;color:var(–muted);margin-top:2px;margin-bottom:12px}
.accent{color:var(–accent)}

/* ═══════════ CARDS ═══════════ */
.cards{display:grid;gap:8px;padding:0 14px;margin-bottom:12px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:repeat(3,1fr)}
.card{background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:11px 12px;box-shadow:var(–shadow)}
.card-lbl{font-size:0.55rem;text-transform:uppercase;letter-spacing:2px;color:var(–muted);margin-bottom:4px;font-weight:700;font-family:‘Barlow Condensed’,sans-serif}
.card-val{font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:1.2rem}
.tip{background:var(–acc-bg);border:1px solid var(–acc-border);border-left:3px solid var(–accent);border-radius:7px;padding:9px 12px;font-size:0.74rem;color:var(–acc-fg);line-height:1.65;margin:0 14px 14px}

/* ═══════════ FORMS ═══════════ */
.fbox{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:14px;margin:0 14px 14px;box-shadow:var(–shadow)}
.ftitle{font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:0.85rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:9px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:0.58rem;text-transform:uppercase;letter-spacing:1.5px;color:var(–muted);font-weight:700;font-family:‘Barlow Condensed’,sans-serif}
input,select,textarea{background:var(–surface);border:1px solid var(–border);color:var(–text);border-radius:7px;padding:9px 10px;font-size:0.82rem;font-family:‘Barlow’,sans-serif;width:100%;outline:none;transition:border-color .2s;box-shadow:var(–shadow)}
input:focus,select:focus{border-color:var(–accent);box-shadow:0 0 0 2px rgba(26,86,219,.1)}
option{background:var(–surface)}
.btn-primary{background:var(–accent);color:#fff;border:none;border-radius:8px;padding:11px;font-weight:800;font-size:0.85rem;cursor:pointer;width:100%;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:2px;text-transform:uppercase;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-danger{background:var(–red);color:#fff;border:none;border-radius:8px;padding:11px;font-weight:800;font-size:0.85rem;cursor:pointer;width:100%;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 12px rgba(220,38,38,.22)}
.btn-row{display:flex;gap:8px;margin:0 14px 12px}
.btn-csv{flex:1;background:var(–grn-bg);color:var(–green);border:1px solid var(–grn-border);border-radius:7px;padding:9px;font-weight:800;font-size:0.68rem;cursor:pointer;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:1px;text-transform:uppercase}
.btn-pdf{flex:1;background:var(–gld-bg);color:var(–gold);border:1px solid var(–gld-border);border-radius:7px;padding:9px;font-weight:800;font-size:0.68rem;cursor:pointer;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:1px;text-transform:uppercase}
.filters{display:flex;gap:8px;margin:0 14px 12px}

/* ═══════════ TPV ═══════════ */
.tpv{padding:14px}
.tpv-display{background:var(–display);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:var(–shadow-md)}
.tpv-display-lbl{font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:var(–disp-meta);font-family:‘Barlow Condensed’,sans-serif;font-weight:700;margin-bottom:5px}
.tpv-amount{font-family:‘Barlow Condensed’,sans-serif;font-size:2.6rem;font-weight:900;letter-spacing:2px;line-height:1;min-height:2.8rem;display:flex;align-items:center;margin-bottom:10px}
.tpv-amount.has{color:var(–disp-amt)}.tpv-amount.empty{color:var(–disp-empty)}
.eur{font-size:1.2rem;opacity:.55;margin-left:5px;align-self:flex-end;margin-bottom:4px}
.tpv-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tpv-badge{display:inline-block;padding:2px 9px;border-radius:4px;font-size:0.63rem;font-weight:800;letter-spacing:1.5px;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase}
.tpv-pay-badge{background:#1e2535;color:#8892a4;padding:2px 9px;border-radius:4px;font-size:0.62rem;font-weight:700;font-family:‘Barlow Condensed’,sans-serif}
.tpv-desc-lbl{font-size:0.68rem;color:var(–disp-meta);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-lbl{font-family:‘Barlow Condensed’,sans-serif;font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(–muted);font-weight:700;margin-bottom:7px}

/* ACT BUTTONS */
.act-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.act-btn{border:1.5px solid;border-radius:11px;padding:10px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .15s;min-height:62px;background:var(–surface);box-shadow:var(–shadow)}
.act-btn:active{transform:scale(.96)}
.act-btn .aic{font-size:1.3rem;line-height:1}
.act-btn .aln{font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:0.82rem;letter-spacing:1.5px;text-transform:uppercase}
[data-theme=“light”] .ab-lav{border-color:#bfdbfe;color:#1d4ed8}
[data-theme=“light”] .ab-lav.sel{border-color:#3b82f6;background:#eff6ff;box-shadow:0 0 0 2px rgba(59,130,246,.18)}
[data-theme=“light”] .ab-loc{border-color:#ddd6fe;color:#7c3aed}
[data-theme=“light”] .ab-loc.sel{border-color:#8b5cf6;background:#f5f3ff;box-shadow:0 0 0 2px rgba(139,92,246,.18)}
[data-theme=“light”] .ab-ven{border-color:#bbf7d0;color:#15803d}
[data-theme=“light”] .ab-ven.sel{border-color:#22c55e;background:#f0fdf4;box-shadow:0 0 0 2px rgba(34,197,94,.18)}
[data-theme=“light”] .ab-aut{border-color:#fed7aa;color:#c2410c}
[data-theme=“light”] .ab-aut.sel{border-color:#f97316;background:#fff7ed;box-shadow:0 0 0 2px rgba(249,115,22,.18)}
[data-theme=“dark”] .ab-lav{border-color:#1e3d6e;color:#60a5fa}
[data-theme=“dark”] .ab-lav.sel{border-color:#3b82f6;background:#0d1e40;box-shadow:0 0 0 2px rgba(59,130,246,.2)}
[data-theme=“dark”] .ab-loc{border-color:#3b1f6e;color:#c084fc}
[data-theme=“dark”] .ab-loc.sel{border-color:#8b5cf6;background:#1e0d40;box-shadow:0 0 0 2px rgba(139,92,246,.2)}
[data-theme=“dark”] .ab-ven{border-color:#14532d;color:#4ade80}
[data-theme=“dark”] .ab-ven.sel{border-color:#22c55e;background:#0a1f10;box-shadow:0 0 0 2px rgba(34,197,94,.2)}
[data-theme=“dark”] .ab-aut{border-color:#431407;color:#fb923c}
[data-theme=“dark”] .ab-aut.sel{border-color:#f97316;background:#1c0a00;box-shadow:0 0 0 2px rgba(249,115,22,.2)}

/* KEYPAD */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.key{background:var(–key);border:1px solid var(–key-border);border-radius:10px;height:48px;font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:1.3rem;color:var(–text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none;box-shadow:var(–shadow)}
.key:active{background:var(–surface2);transform:scale(.95);box-shadow:none}
.key.k0{grid-column:span 2}.key.kdel{background:var(–red-bg);color:var(–red);border-color:var(–red-border)}

/* PAY BUTTONS */
.pay-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.pay-btn{background:var(–surface);border:1.5px solid var(–border);border-radius:10px;padding:9px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;box-shadow:var(–shadow)}
.pay-btn:active{transform:scale(.96)}
.pay-btn.sel{border-color:var(–accent);background:var(–acc-bg);box-shadow:0 0 0 2px rgba(26,86,219,.15)}
.pay-ico{font-size:1.2rem}.pay-lbl{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;color:var(–text2)}
.pay-btn.sel .pay-lbl{color:var(–accent)}

/* FIELDS */
.tpv-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.tpv-field{display:flex;flex-direction:column;gap:3px}
.tpv-field label{font-size:0.57rem;text-transform:uppercase;letter-spacing:1.5px;color:var(–muted);font-family:‘Barlow Condensed’,sans-serif;font-weight:700}
.btn-encaisser{width:100%;background:var(–accent);color:#fff;border:none;border-radius:12px;padding:14px;font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:14px;box-shadow:0 4px 14px rgba(26,86,219,.28)}
.btn-encaisser:active{transform:scale(.98)}.btn-encaisser:disabled{background:var(–border);color:var(–muted2);box-shadow:none;cursor:not-allowed}

/* ═══════════ JOURNAL ITEMS ═══════════ */
.jlist{padding:0 14px}
.jitem{background:var(–surface);border:1px solid var(–border);border-radius:9px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:var(–shadow)}
.jleft{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.jbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.56rem;font-weight:800;letter-spacing:1.5px;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase;flex-shrink:0}
[data-theme=“light”] .jb-lav{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
[data-theme=“light”] .jb-loc{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
[data-theme=“light”] .jb-ven{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
[data-theme=“light”] .jb-aut{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
[data-theme=“dark”] .jb-lav{background:#0d1e40;color:#60a5fa;border:1px solid #1e3d6e}
[data-theme=“dark”] .jb-loc{background:#1e0d40;color:#c084fc;border:1px solid #3b1f6e}
[data-theme=“dark”] .jb-ven{background:#0a1f10;color:#4ade80;border:1px solid #14532d}
[data-theme=“dark”] .jb-aut{background:#1c0a00;color:#fb923c;border:1px solid #431407}
.jb-achat{background:var(–red-bg);color:var(–red);border:1px solid var(–red-border)}
.jinfo{min-width:0;flex:1}
.jdesc{font-size:0.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jmeta{font-size:0.6rem;color:var(–muted);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pay-chip{display:inline-block;background:var(–surface2);border:1px solid var(–border);border-radius:3px;padding:1px 5px;font-size:0.55rem;font-weight:700;font-family:‘Barlow Condensed’,sans-serif}
.jamt{font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:1rem;flex-shrink:0}
.del-btn{background:var(–red-bg);color:var(–red);border:1px solid var(–red-border);border-radius:5px;padding:4px 8px;font-size:0.63rem;cursor:pointer;font-weight:800;flex-shrink:0}
.edit-btn{background:var(–acc-bg);color:var(–accent);border:1px solid var(–acc-border);border-radius:5px;padding:4px 8px;font-size:0.63rem;cursor:pointer;font-weight:800;flex-shrink:0}
.jempty{text-align:center;padding:24px 20px;color:var(–muted);font-size:0.82rem}

/* ═══════════ STATUT BADGES ═══════════ */
.sbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:0.56rem;font-weight:800;letter-spacing:1px;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase}
.s-regle{background:var(–grn-bg);color:var(–green);border:1px solid var(–grn-border)}
.s-echelonne{background:var(–gld-bg);color:var(–gold);border:1px solid var(–gld-border)}
.s-impaye{background:var(–red-bg);color:var(–red);border:1px solid var(–red-border)}

/* ═══════════ MODAL ═══════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:var(–surface);border:1px solid var(–border);border-radius:14px;padding:20px;width:100%;max-width:420px;box-shadow:var(–shadow-md);max-height:85vh;overflow-y:auto;margin:auto}
.modal-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;margin-top:16px}
.btn-save{flex:1;background:var(–accent);color:#fff;border:none;border-radius:8px;padding:11px;font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.btn-cancel{background:var(–surface2);color:var(–muted);border:1px solid var(–border);border-radius:8px;padding:11px 16px;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer}
.statut-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.statut-btn{border:1.5px solid var(–border);border-radius:8px;padding:8px 4px;cursor:pointer;background:var(–surface);font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;color:var(–text2);transition:all .15s;text-align:center}
.statut-btn.sel-regle{border-color:var(–green);background:var(–grn-bg);color:var(–green)}
.statut-btn.sel-echelonne{border-color:var(–gold);background:var(–gld-bg);color:var(–gold)}
.statut-btn.sel-impaye{border-color:var(–red);background:var(–red-bg);color:var(–red)}

/* ═══════════ TABLES ═══════════ */
.twrap{background:var(–surface);border:1px solid var(–border);border-radius:10px;overflow:hidden;margin:0 14px 14px;box-shadow:var(–shadow)}
table{width:100%;border-collapse:collapse;min-width:300px}
thead tr{background:var(–surface2);border-bottom:1px solid var(–border)}
th{padding:9px 8px;font-size:0.55rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(–muted);font-family:‘Barlow Condensed’,sans-serif;text-align:left}
th.r,td.r{text-align:right}
tbody tr{border-bottom:1px solid var(–border);transition:background .15s}
tbody tr:hover{background:var(–surface2)}
td{padding:8px;font-size:0.77rem}
tfoot tr{background:var(–surface2);border-top:1px solid var(–border2)}
tfoot td{padding:9px 8px;font-size:0.8rem;font-weight:700;font-family:‘Barlow Condensed’,sans-serif}

/* ═══════════ ANNUEL ═══════════ */
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 14px 14px}
.month-cell{background:var(–surface);border:1px solid var(–border);border-radius:8px;padding:8px 5px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(–shadow)}
.month-cell:hover{border-color:var(–accent)}.month-cell.now{border-color:var(–accent);background:var(–acc-bg)}
.month-cell .mn{font-size:0.52rem;text-transform:uppercase;letter-spacing:1.5px;color:var(–muted);margin-bottom:3px;font-family:‘Barlow Condensed’,sans-serif;font-weight:700}
.month-cell .mv{font-weight:800;font-size:0.84rem;font-family:‘Barlow Condensed’,sans-serif}
.act-bars{background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:14px;margin:0 14px 14px;box-shadow:var(–shadow)}
.ab-title{font-family:‘Barlow Condensed’,sans-serif;font-size:0.68rem;text-transform:uppercase;letter-spacing:2px;color:var(–muted);font-weight:800;margin-bottom:10px}

/* ════════════════════════════════════
   HELPERS
════════════════════════════════════ */
function _isoToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseDate(s){if(!s)return new Date();const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtDate(s){return parseDate(s).toLocaleDateString('fr-FR');}
function fmtDateLong(s){return parseDate(s).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});}
function sum(arr){return arr.reduce((s,r)=>s+r.amount,0);}
function sumAct(arr,k){return arr.filter(r=>r.activite===k).reduce((s,r)=>s+r.amount,0);}
function getAct(k){return ACTS.find(a=>a.key===k)||ACTS[0];}
function getPay(k){return PAYS.find(p=>p.key===k)||PAYS[0];}
function getMonthRecs(y,m){return recettes.filter(r=>{const d=parseDate(r.date);return d.getFullYear()===y&&d.getMonth()===m;});}
function getYearRecs(y){return recettes.filter(r=>parseDate(r.date).getFullYear()===y);}
function getMonthAchats(y,m){return achats.filter(r=>{const d=parseDate(r.date);return d.getFullYear()===y&&d.getMonth()===m;});}
function getYearAchats(y){return achats.filter(r=>parseDate(r.date).getFullYear()===y);}
function getTodayRecs(){return recettes.filter(r=>r.date===_isoToday());}
function getYears(){return[...new Set([CY,...recettes.map(r=>parseDate(r.date).getFullYear()),...achats.map(r=>parseDate(r.date).getFullYear())])].sort((a,b)=>b-a);}
function yopts(years){return years.map(y=>`<option value="${y}"${y===filterYear?' selected':''}>${y}</option>`).join('');}
function mopts(){return MOIS.map((m,i)=>`<option value="${i}"${i===filterMonth?' selected':''}>${m}</option>`).join('');}

/* ════════════════════════════════════
   ALERTES SASU
════════════════════════════════════ */
function getEcheances(){
  const y=CY, today=new Date(), ech=[];
  function add(ds,title,desc,url){
    const d=parseDate(ds), diff=Math.round((d-today)/86400000);
    let status='ok', label='À venir';
    if(diff<0){status='past';label='Passée';}
    else if(diff<=7){status='urgent';label='🚨 '+diff+'j';}
    else if(diff<=30){status='soon';label='⚠️ '+diff+'j';}
    ech.push({d,title,desc,url,status,label});
  }
  if(settings.periodicite==='mensuel'){
    for(let m=0;m<12;m++){const d=new Date(y,m+1,15);add(d.toISOString().split('T')[0],'🔴 URSSAF dirigeant — '+MOIS[m],'Cotisations sociales dirigeant '+MOIS[m]+'\nSeulement si tu te verses un salaire','https://www.urssaf.fr');}
  }else{
    add(y+'-04-30','🔴 URSSAF T1 dirigeant','Cotisations sociales T1 (Jan/Fév/Mar)\nSeulement si tu te verses un salaire','https://www.urssaf.fr');
    add(y+'-07-31','🔴 URSSAF T2 dirigeant','Cotisations sociales T2 (Avr/Mai/Jun)','https://www.urssaf.fr');
    add(y+'-10-31','🔴 URSSAF T3 dirigeant','Cotisations sociales T3 (Jul/Aoû/Sep)','https://www.urssaf.fr');
    add((y+1)+'-01-31','🔴 URSSAF T4 dirigeant','Cotisations sociales T4 (Oct/Nov/Déc)','https://www.urssaf.fr');
  }
  add(y+'-05-31','📋 Liasse fiscale','Dépôt liasse fiscale + comptes annuels\n💡 À faire avec ton comptable','https://www.impots.gouv.fr');
  add(y+'-06-30','🏛️ Assemblée Générale','AG annuelle obligatoire SASU\nApprobation des comptes de l\'exercice','https://www.inpi.fr');
  add(y+'-09-15','💰 Acompte IS','Acompte Impôt sur les Sociétés\n💡 Si IS > 3000€ l\'an dernier','https://www.impots.gouv.fr');
  add(y+'-12-15','💼 CFE','Cotisation Foncière des Entreprises\nSur impots.gouv.fr','https://www.impots.gouv.fr');
  add(y+'-12-15','💰 Solde IS','Solde Impôt sur les Sociétés\n💡 À calculer avec ton comptable','https://www.impots.gouv.fr');
  return ech.sort((a,b)=>a.d-b.d);
}

function updateAlerts(){
  const alertes=getEcheances().filter(e=>e.status==='urgent'||e.status==='soon');
  const badge=document.getElementById('alert-badge');
  const banner=document.getElementById('alert-banner');
  if(alertes.length){
    badge.style.display='block';badge.textContent='🔔 '+alertes.length;
    banner.style.display='flex';
    banner.innerHTML=alertes.map(a=>`<span class="alert-pill" style="background:${a.status==='urgent'?'var(--red-bg)':'var(--gld-bg)'};color:${a.status==='urgent'?'var(--red)':'var(--gold)'};border:1px solid ${a.status==='urgent'?'var(--red-border)':'var(--gld-border)'}">${a.title.split('—')[0].trim()} — ${a.label}</span>`).join('');
  }else{badge.style.display='none';banner.style.display='none';}
}

/* ════════════════════════════════════
   NAVIGATION
════════════════════════════════════ */
function setSection(s){
  section=s;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const navSections=['tpv','achats','annuaire','compta'];
  const navKey=navSections.includes(s)?s:null;
  if(navKey){const nb=document.getElementById('nav-'+navKey);if(nb)nb.classList.add('active');}
  render();
}

function render(){
  const c=document.getElementById('content');if(!c)return;
  if(section==='tpv')renderTPV(c);
  else if(section==='achats')renderAchats(c);
  else if(section==='annuaire')renderAnnuaire(c);
  else if(section==='compta')renderCompta(c);
  else if(section==='journal')renderJournal(c);
  else if(section==='annuel')renderAnnuel(c);
  else if(section==='bilan')renderBilan(c);
  else if(section==='alertes')renderAlertes(c);
  else if(section==='impaye')renderImpaye(c);
  else if(section==='settings')renderSettings(c);
}

      ${ACTS.map(a=>`<button class="act-btn ${a.btnCls}${tpvAct===a.key?' sel':''}" onclick="selAct('${a.key}')">
        <span class="aic">${a.icon}</span><span class="aln">${a.label}</span>
      </button>`).join('')}

    <div class="tpv-display">
      <div class="tpv-display-lbl">Montant à encaisser</div>
      <div class="tpv-amount ${amtNum>0?'has':'empty'}" id="tpv-disp-amt">
        ${amtNum>0?tpvAmt.replace('.',','):'0,00'}<span class="eur">€</span>
      </div>
      <div class="tpv-meta">
        <span class="tpv-badge" id="tpv-disp-act" style="${actStyle}">${act.icon} ${act.label}</span>

      <button class="key" onclick="kp('.')">•</button>

    <div class="sec-lbl">Mode de paiement</div>
    <div class="pay-btns">
      ${PAYS.map(p=>`<button class="pay-btn${tpvPay===p.key?' sel':''}" onclick="selPay('${p.key}')">
        <span class="pay-ico">${p.icon}</span><span class="pay-lbl">${p.label}</span>
      </button>`).join('')}

function updDisp(){
  const amtNum=parseFloat(tpvAmt)||0;
  const d=document.getElementById('tpv-disp-amt');
  if(d){d.className='tpv-amount '+(amtNum>0?'has':'empty');d.innerHTML=(amtNum>0?tpvAmt.replace('.',','):'0,00')+'<span class="eur">€</span>';}
  const dd=document.getElementById('tpv-disp-desc');
  if(dd)dd.innerHTML=tpvDesc||'<span style="opacity:.4">Description...</span>';
  const btn=document.getElementById('btn-enc');
  if(btn){btn.disabled=amtNum<=0;btn.textContent='✓ ENCAISSER'+(amtNum>0?' — '+amtNum.toFixed(2)+' €':'');}
}

function kp(k){
  if(k==='.'){if(tpvAmt.includes('.'))return;if(!tpvAmt)tpvAmt='0';tpvAmt+='.';}
  else{if(tpvAmt.includes('.')&&tpvAmt.split('.')[1].length>=2)return;if(tpvAmt==='0')tpvAmt=k;else tpvAmt+=k;if(tpvAmt.length>9)return;}
  updDisp();
}
function kd(){tpvAmt=tpvAmt.slice(0,-1);updDisp();}

function selAct(k){
  tpvAct=k;
  document.querySelectorAll('.act-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.act-btn').forEach((b,i)=>{if(ACTS[i]&&ACTS[i].key===k)b.classList.add('sel');});
  const a=getAct(k);
  const badge=document.getElementById('tpv-disp-act');
  if(badge){badge.textContent=a.icon+' '+a.label;badge.style.cssText=`background:${a.color}22;color:${a.color};border:1px solid ${a.color}44`;}
}
function selPay(k){
  tpvPay=k;
  document.querySelectorAll('.pay-btn').forEach((b,i)=>{PAYS[i]&&PAYS[i].key===k?b.classList.add('sel'):b.classList.remove('sel');});
  const p=getPay(k);
  const badge=document.getElementById('tpv-disp-pay');
  if(badge)badge.textContent=p.icon+' '+p.label;
}

async function encaisser(){
  const amt=parseFloat(tpvAmt);
  if(isNaN(amt)||amt<=0){showToast('Montant invalide','err');return;}
  const btn=document.getElementById('btn-enc');if(btn)btn.disabled=true;
  try{
    const rows=await sbInsert('recettes',{date:tpvDate,description:tpvDesc||getAct(tpvAct).label,montant:amt,activite:tpvAct,paiement:tpvPay,facture:tpvFacture||null,statut:'regle'});
    const r=rows[0];
    recettes.push({id:r.id,date:r.date,desc:r.description,amount:parseFloat(r.montant),activite:r.activite,paiement:r.paiement,facture:r.facture||'',statut:r.statut||'regle',date_reglement:'',mode_reglement:'',nb_echeances:null,date_echeance:'',echeances:null});
    tpvAmt='';tpvDesc='';tpvFacture='';
    showToast('+'+amt.toFixed(2)+' € encaissé ✓');render();
  }catch(e){showToast('Erreur sauvegarde','err');console.error(e);if(btn)btn.disabled=false;}
}

  <div class="fbox">
    <div class="ftitle" style="color:var(--red)">➕ Nouvel achat / charge</div>
    <div class="fgrid">
      <div class="fg"><label>Date</label><input type="date" id="a-date" value="${aForm.date}" onchange="aForm.date=this.value"></div>
      <div class="fg"><label>Catégorie</label><select id="a-cat" onchange="aForm.cat=this.value">${CAT_ACHATS.map(cat=>`<option${aForm.cat===cat?' selected':''}>${cat}</option>`).join('')}</select></div>

        <datalist id="fo-list">${fo}</datalist>

      <div class="fg" style="grid-column:span 2"><label>Montant (€)</label>
        <input type="number" id="a-amt" value="${aForm.amount}" placeholder="0,00" step="0.01" style="font-size:1.4rem;font-weight:800;padding:12px 14px;font-family:'Barlow Condensed',sans-serif" oninput="aForm.amount=this.value"></div>
      <div class="fg"><label>N° Facture fournisseur</label><input type="text" id="a-fac" value="${aForm.facture}" placeholder="FOURN-2026-001" oninput="aForm.facture=this.value"></div>
    </div>
    <button class="btn-danger" onclick="addAchat()">🛒 Enregistrer l'achat</button>
  </div>
  <div class="jlist">${sorted.length===0?'<div class="jempty">Aucun achat ce mois</div>':sorted.map(r=>jItemAchat(r)).join('')}</div>
  <div class="spacer"></div>`;
}

async function addAchat(){
  const date=document.getElementById('a-date')?.value||aForm.date;
  const desc=document.getElementById('a-desc')?.value||aForm.desc;
  const amount=document.getElementById('a-amt')?.value||aForm.amount;
  const cat=document.getElementById('a-cat')?.value||aForm.cat;
  const facture=document.getElementById('a-fac')?.value||aForm.facture;
  if(!date||!amount){showToast('Date et montant requis','err');return;}
  const amt=parseFloat(amount);
  if(isNaN(amt)||amt<=0){showToast('Montant invalide','err');return;}
  try{
    const rows=await sbInsert('achats',{date,description:desc,montant:amt,categorie:cat,facture:facture||null,statut:'impaye'});
    const r=rows[0];
    achats.push({id:r.id,date:r.date,desc:r.description,amount:parseFloat(r.montant),cat:r.categorie||'Autre',facture:r.facture||'',statut:r.statut||'impaye',date_reglement:'',mode_reglement:'',nb_echeances:null,date_echeance:'',echeances:null});
    aForm={date,desc:'',amount:'',cat,facture:''};
    showToast('-'+amt.toFixed(2)+' € enregistré ✓');render();
  }catch(e){showToast('Erreur sauvegarde','err');console.error(e);}
}

function addFournisseur(){
  const nom=document.getElementById('f-nom')?.value?.trim();
  if(!nom){showToast('Nom obligatoire','err');return;}
  if(fournisseurs.find(f=>f.nom.toLowerCase()===nom.toLowerCase())){showToast('Déjà existant','err');return;}
  fournisseurs.push({id:Date.now(),nom,compte:document.getElementById('f-compte')?.value||'',tel:document.getElementById('f-tel')?.value||'',email:document.getElementById('f-email')?.value||'',adresse:document.getElementById('f-adresse')?.value||'',iban:document.getElementById('f-iban')?.value||''});
  saveFournisseurs();showToast('Fournisseur ajouté ✓');render();
}
function addClient(){
  const nom=document.getElementById('c-nom')?.value?.trim();
  if(!nom){showToast('Nom obligatoire','err');return;}
  if(clients.find(c=>c.nom.toLowerCase()===nom.toLowerCase())){showToast('Déjà existant','err');return;}
  clients.push({id:Date.now(),nom,compte:document.getElementById('c-compte')?.value||'',tel:document.getElementById('c-tel')?.value||'',email:document.getElementById('c-email')?.value||'',adresse:document.getElementById('c-adresse')?.value||''});
  saveClients();showToast('Client ajouté ✓');render();
}
function delFournisseur(id){if(!confirm('Supprimer ?'))return;fournisseurs=fournisseurs.filter(f=>f.id!==id);saveFournisseurs();showToast('Supprimé');render();}
function delClient(id){if(!confirm('Supprimer ?'))return;clients=clients.filter(c=>c.id!==id);saveClients();showToast('Supprimé');render();}

/* ════════════════════════════════════
   COMPTA (sous-menu)
════════════════════════════════════ */
function renderCompta(c){
  const tabs=[{k:'journal',icon:'📋',lbl:'Journal'},{k:'annuel',icon:'📅',lbl:'Annuel'},{k:'bilan',icon:'📄',lbl:'Bilan'},{k:'impaye',icon:'⏳',lbl:'Impayés'},{k:'alertes',icon:'🔔',lbl:'Alertes'}];
  c.innerHTML=`
  <div class="subtabs" style="flex-wrap:wrap;gap:5px">${tabs.map(t=>`<button class="subtab${section===t.k?' active':''}" onclick="setSection('${t.k}')" style="min-width:0;flex:1">${t.icon} ${t.lbl}</button>`).join('')}</div>
  <div id="compta-inner"></div>`;
  const inner=document.getElementById('compta-inner');
  if(section==='journal')renderJournal(inner);
  else if(section==='annuel')renderAnnuel(inner);
  else if(section==='bilan')renderBilan(inner);
  else if(section==='impaye')renderImpaye(inner);
  else if(section==='alertes')renderAlertes(inner);
  else renderJournal(inner);
}

    <select onchange="filterYear=parseInt(this.value);render()" style="flex:1">${yopts(years)}</select>

  </div>
  <div class="cards c2" style="margin-bottom:12px">
    <div class="card"><div class="card-lbl">CA ${MOIS_C[filterMonth]}</div><div class="card-val" style="color:var(--green)">${mTotal.toFixed(2)} €</div></div>
    <div class="card"><div class="card-lbl">Achats ${MOIS_C[filterMonth]}</div><div class="card-val" style="color:var(--red)">-${sum(getMonthAchats(filterYear,filterMonth)).toFixed(2)} €</div></div>

  <div class="spacer"></div>`;
}

/* ════════════════════════════════════
   ANNUEL
════════════════════════════════════ */
function renderAnnuel(c){
  const years=getYears();
  const yr=getYearRecs(filterYear), yTotal=sum(yr);
  const yAchats=sum(getYearAchats(filterYear));

  const monthCells=MOIS.map((m,i)=>{
    const mt=sum(getMonthRecs(filterYear,i)), isNow=filterYear===CY&&i===CM;
    return`<div class="month-cell${isNow?' now':''}" onclick="filterMonth=${i};setSection('journal')">
      <div class="mn">${MOIS_C[i]}</div>
      <div class="mv" style="color:${mt>0?'var(--green)':'var(--muted2)'}">${mt>0?mt.toFixed(0)+'€':'—'}</div>
    </div>`;
  }).join('');

  const tableRows=MOIS.map((m,i)=>{
    const recs=getMonthRecs(filterYear,i), mt=sum(recs), ac=sum(getMonthAchats(filterYear,i));
    return`<tr onclick="filterMonth=${i};setSection('journal')" style="cursor:pointer">
      <td style="font-family:'Barlow Condensed',sans-serif;font-weight:700">${m}</td>
      <td class="r" style="color:${mt>0?'var(--green)':'var(--muted2)'};font-family:'Barlow Condensed',sans-serif;font-weight:700">${mt>0?mt.toFixed(2)+' €':'—'}</td>
      <td class="r" style="color:${ac>0?'var(--red)':'var(--muted2)'};font-family:'Barlow Condensed',sans-serif">${ac>0?'-'+ac.toFixed(2)+' €':'—'}</td>
      <td class="r" style="color:${mt>0?'var(--accent)':'var(--muted2)'};font-family:'Barlow Condensed',sans-serif">${mt>0?(mt-ac).toFixed(2)+' €':'—'}</td>
    </tr>`;
  }).join('');

  const actBars=ACTS.map(a=>{
    const v=sumAct(yr,a.key);if(!v)return'';
    const pct=yTotal>0?Math.round(v/yTotal*100):0;
    return`<div class="ab-row"><span class="ab-lbl" style="color:${a.color}">${a.icon} ${a.label}</span><div class="ab-bg"><div class="ab-fill" style="background:${a.color};width:${pct}%"></div></div><span class="ab-val" style="color:${a.color}">${v.toFixed(0)} €</span></div>`;
  }).join('');

  c.innerHTML=`
  <div class="section-hdr"><div class="section-title">Annuel <span class="accent">${filterYear}</span></div><div class="section-sub">Vue d'ensemble SASU</div></div>
  <div class="filters"><select onchange="filterYear=parseInt(this.value);render()">${yopts(years)}</select></div>
  <div class="tip">💡 <strong>SASU CSCAR</strong> — Résultat = CA − Charges. L'IS est calculé par ton comptable sur le bénéfice annuel.</div>
  <div class="cards c2" style="margin-bottom:10px">
    <div class="card"><div class="card-lbl">CA ${filterYear}</div><div class="card-val" style="color:var(--green)">${yTotal.toFixed(2)} €</div></div>
    <div class="card"><div class="card-lbl">Achats ${filterYear}</div><div class="card-val" style="color:var(--red)">-${yAchats.toFixed(2)} €</div></div>
    <div class="card" style="border-color:var(--acc-border)"><div class="card-lbl">Résultat brut</div><div class="card-val" style="color:var(--accent)">${(yTotal-yAchats).toFixed(2)} €</div></div>
  </div>
  ${actBars?`<div class="act-bars"><div class="ab-title">Répartition CA par activité</div>${actBars}</div>`:''}
  <div class="month-grid">${monthCells}</div>
  <div class="btn-row">
    <button class="btn-csv" onclick="exportCSV('year')">📋 CSV annuel</button>
    <button class="btn-pdf" onclick="exportPDF('year')">📄 PDF annuel</button>
  </div>
  <div class="twrap"><div style="overflow-x:auto">
    <table><thead><tr><th>Mois</th><th class="r">CA</th><th class="r">Achats</th><th class="r">Résultat</th></tr></thead>
    <tbody>${tableRows}</tbody>
    <tfoot><tr><td>TOTAL ${filterYear}</td><td class="r" style="color:var(--green)">${yTotal.toFixed(2)} €</td><td class="r" style="color:var(--red)">-${yAchats.toFixed(2)} €</td><td class="r" style="color:var(--accent)">${(yTotal-yAchats).toFixed(2)} €</td></tr></tfoot>
    </table></div></div>`;
}

/* ════════════════════════════════════

════════════════════════════════════ */
function renderBilan(c){
  const years=getYears();

  const actLines=ACTS.map(a=>{

    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">

  c.innerHTML=`

  <div class="filters"><select onchange="filterYear=parseInt(this.value);render()">${yopts(years)}</select></div>

  <div class="bilan-grid">
    <button class="bilan-btn" style="background:var(--grn-bg);color:var(--green);border-color:var(--grn-border)" onclick="exportCSV('year')"><div style="font-size:1.4rem;margin-bottom:6px">📋</div>Export CSV<div style="font-size:.6rem;opacity:.7;margin-top:4px">Ciel · EBP · Comptable</div></button>
    <button class="bilan-btn" style="background:var(--gld-bg);color:var(--gold);border-color:var(--gld-border)" onclick="exportPDF('year')"><div style="font-size:1.4rem;margin-bottom:6px">📄</div>Export PDF<div style="font-size:.6rem;opacity:.7;margin-top:4px">Officiel · INPI</div></button>
  </div>
  <div class="result-box">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.82rem;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:12px">Résultat SASU ${filterYear}</div>
    <div class="result-row"><span class="result-lbl">💰 CA Total</span><span class="result-val" style="color:var(--green)">+ ${yTotal.toFixed(2)} €</span></div>
    <div class="result-row"><span class="result-lbl">🛒 Charges / Achats</span><span class="result-val" style="color:var(--red)">- ${yAchTotal.toFixed(2)} €</span></div>
    <div class="result-row"><span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.95rem;text-transform:uppercase;letter-spacing:1px">Résultat brut avant IS</span><span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;color:${resultat>=0?'var(--accent)':'var(--red)'}">${resultat>=0?'+':''}${resultat.toFixed(2)} €</span></div>
  </div>
  ${actLines?`<div class="fbox"><div class="ftitle" style="color:var(--green)">Recettes par activité</div>${actLines}</div>`:''}
  ${achLines?`<div class="fbox"><div class="ftitle" style="color:var(--red)">Achats par catégorie</div>${achLines}<div style="display:flex;justify-content:space-between;padding:8px 0;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.9rem"><span>Total achats</span><span style="color:var(--red)">- ${yAchTotal.toFixed(2)} €</span></div></div>`:''}

    <div class="ftitle" style="color:var(--accent)">Infos entreprise — ${settings.nom||'CSCAR'}</div>

      <span style="color:var(--muted)">Entreprise</span><strong>${settings.nom||'—'}</strong>
      <span style="color:var(--muted)">Président</span><strong>${settings.gerant||'—'}</strong>

      <span style="color:var(--muted)">Adresse</span><strong>${settings.adresse||'—'}</strong>
      <span style="color:var(--muted)">Forme</span><strong>SASU</strong>
      <span style="color:var(--muted)">Exercice</span><strong>01/01/${filterYear} — 31/12/${filterYear}</strong>

  </div>
  <div class="spacer"></div>`;
}

}

/* ════════════════════════════════════
   MODAL EDITION
════════════════════════════════════ */
function closeModal(){document.getElementById('edit-modal').style.display='none';editId=null;editType=null;editObj={};}

function openEditRec(id){
  const r=recettes.find(x=>x.id===id);if(!r)return;
  editId=id;editType='rec';editObj={...r};
  document.getElementById('modal-title').textContent='✏️ Modifier recette';
  document.getElementById('modal-body').innerHTML=modalBody(r,'rec');
  document.getElementById('edit-modal').style.display='flex';
}
function openEditAchat(id){
  const r=achats.find(x=>x.id===id);if(!r)return;
  editId=id;editType='achat';editObj={...r};
  document.getElementById('modal-title').textContent='✏️ Modifier achat';
  document.getElementById('modal-body').innerHTML=modalBody(r,'achat');
  document.getElementById('edit-modal').style.display='flex';
}

function modalBody(r,type){
  const statut=r.statut||( type==='rec'?'regle':'impaye');
  const isRec=type==='rec';
  return`
  <div class="fgrid" style="margin-bottom:10px">
    <div class="fg"><label>Date</label><input type="date" id="e-date" value="${r.date}"></div>
    <div class="fg"><label>Montant (€)</label><input type="number" id="e-amt" value="${r.amount}" step="0.01"></div>
    <div class="fg" style="grid-column:span 2"><label>${isRec?'Description':'Description / Fournisseur'}</label><input type="text" id="e-desc" value="${r.desc||''}"></div>
    ${isRec?`<div class="fg"><label>Activité</label><select id="e-act">${ACTS.map(a=>`<option value="${a.key}"${r.activite===a.key?' selected':''}>${a.icon} ${a.label}</option>`).join('')}</select></div>`:''}
    ${!isRec?`<div class="fg"><label>Catégorie</label><select id="e-cat">${CAT_ACHATS.map(cat=>`<option${r.cat===cat?' selected':''}>${cat}</option>`).join('')}</select></div>`:''}
    <div class="fg"><label>N° Facture</label><input type="text" id="e-fac" value="${r.facture||''}"></div>
  </div>
  <div class="fg" style="margin-bottom:8px"><label>Statut paiement</label></div>
  <div class="statut-btns">
    <button class="statut-btn${statut==='regle'?' sel-regle':''}" onclick="selStatut('${type}','regle')">✅ Réglé</button>
    <button class="statut-btn${statut==='echelonne'?' sel-echelonne':''}" onclick="selStatut('${type}','echelonne')">⏳ Échelonné</button>
    <button class="statut-btn${statut==='impaye'?' sel-impaye':''}" onclick="selStatut('${type}','impaye')">❌ Non réglé</button>
  </div>
  <div id="statut-extra">${statutExtra(statut,r)}</div>`;
}

function statutExtra(statut,r){
  if(statut==='regle')return`
    <div class="fgrid"><div class="fg"><label>Date de règlement</label><input type="date" id="e-dreg" value="${r.date_reglement||''}"></div>
    <div class="fg"><label>Mode (facultatif)</label><select id="e-mreg"><option value="">— Non précisé —</option>${PAYS.map(p=>`<option value="${p.key}"${r.mode_reglement===p.key?' selected':''}>${p.icon} ${p.label}</option>`).join('')}</select></div></div>`;
  if(statut==='echelonne'){
    const nb=r.nb_echeances||2;
    const echs=r.echeances||Array.from({length:nb},()=>({date:'',montant:'',cheque:''}));
    return`<div style="margin-top:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <label style="font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700">Nb d'échéances</label>
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="chgNb(-1)" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:1rem;color:var(--text)">−</button>
          <span id="nb-val" style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;min-width:20px;text-align:center">${nb}</span>
          <button onclick="chgNb(1)" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:1rem;color:var(--text)">+</button>
        </div>
      </div>
      <div id="ech-lines">${echLines(echs)}</div>
    </div>`;
  }
  if(statut==='impaye')return`<div class="fg" style="margin-top:8px"><label>Date d'échéance prévue</label><input type="date" id="e-dech" value="${r.date_echeance||''}"></div>`;
  return'';
}

function echLines(echs){
  return echs.map((e,i)=>`
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:1px;color:var(--accent);margin-bottom:8px">ÉCHÉANCE ${i+1}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px">
      <div class="fg"><label>Date</label><input type="date" id="ed-${i}" value="${e.date||''}"></div>
      <div class="fg"><label>Montant €</label><input type="number" id="em-${i}" value="${e.montant||''}" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="fg"><label>N° Chèque</label><input type="text" id="ec-${i}" value="${e.cheque||''}" placeholder="CHQ-XXXXXX"></div>
  </div>`).join('');
}

function selStatut(type,statut){
  editObj.statut=statut;
  document.querySelectorAll('.statut-btn').forEach(b=>{b.className='statut-btn';});
  const classes={regle:'sel-regle',echelonne:'sel-echelonne',impaye:'sel-impaye'};
  const btns=document.querySelectorAll('.statut-btn');
  const idx={regle:0,echelonne:1,impaye:2}[statut];
  if(btns[idx])btns[idx].classList.add(classes[statut]);
  const extra=document.getElementById('statut-extra');
  if(extra)extra.innerHTML=statutExtra(statut,editObj);
}

function chgNb(delta){
  const val=document.getElementById('nb-val');if(!val)return;
  let nb=parseInt(val.textContent)+delta;
  if(nb<2)nb=2;if(nb>36)nb=36;
  val.textContent=nb;
  editObj.nb_echeances=nb;
  const existing=editObj.echeances||[];
  editObj.echeances=Array.from({length:nb},(_,i)=>existing[i]||{date:'',montant:'',cheque:''});
  const lines=document.getElementById('ech-lines');
  if(lines)lines.innerHTML=echLines(editObj.echeances);
}

function collectExtra(statut){
  const out={statut};
  if(statut==='regle'){
    out.date_reglement=document.getElementById('e-dreg')?.value||'';
    out.mode_reglement=document.getElementById('e-mreg')?.value||'';
  }else if(statut==='echelonne'){
    const nb=parseInt(document.getElementById('nb-val')?.textContent||2);
    out.nb_echeances=nb;
    out.echeances=Array.from({length:nb},(_,i)=>({
      date:document.getElementById('ed-'+i)?.value||'',
      montant:parseFloat(document.getElementById('em-'+i)?.value)||0,
      cheque:document.getElementById('ec-'+i)?.value||''
    }));
  }else if(statut==='impaye'){
    out.date_echeance=document.getElementById('e-dech')?.value||'';
  }
  return out;
}

async function saveEdit(){
  const date=document.getElementById('e-date')?.value;
  const amt=parseFloat(document.getElementById('e-amt')?.value);
  const desc=document.getElementById('e-desc')?.value||'';
  const fac=document.getElementById('e-fac')?.value||'';
  if(!date||isNaN(amt)){showToast('Données invalides','err');return;}
  const extra=collectExtra(editObj.statut||( editType==='rec'?'regle':'impaye'));
  try{
    if(editType==='rec'){
      const act=document.getElementById('e-act')?.value||editObj.activite;
      await sbUpdate('recettes',editId,{date,description:desc,montant:amt,activite:act,facture:fac||null,...extra});
      const idx=recettes.findIndex(r=>r.id===editId);
      if(idx>=0)recettes[idx]={...recettes[idx],date,desc,amount:amt,activite:act,facture:fac,...extra};
    }else{
      const cat=document.getElementById('e-cat')?.value||editObj.cat;
      await sbUpdate('achats',editId,{date,description:desc,montant:amt,categorie:cat,facture:fac||null,...extra});
      const idx=achats.findIndex(r=>r.id===editId);
      if(idx>=0)achats[idx]={...achats[idx],date,desc,amount:amt,cat,facture:fac,...extra};
    }
    showToast('Modifié ✓');closeModal();render();
  }catch(e){showToast('Erreur','err');console.error(e);}
}

════════════════════════════════════ */
async function delRec(id){
  if(!confirm('Supprimer cette recette ?'))return;
  try{await sbDelete('recettes',id);recettes=recettes.filter(r=>r.id!==id);showToast('Supprimé');render();}
  catch(e){showToast('Erreur','err');}
}
async function delAchat(id){
  if(!confirm('Supprimer cet achat ?'))return;
  try{await sbDelete('achats',id);achats=achats.filter(a=>a.id!==id);showToast('Supprimé');render();}
  catch(e){showToast('Erreur','err');}
}

function exportCSV(type){
  const data=type==='month'?getMonthRecs(filterYear,filterMonth):getYearRecs(filterYear);
  const acData=type==='month'?getMonthAchats(filterYear,filterMonth):getYearAchats(filterYear);
  const period=type==='month'?MOIS[filterMonth]+'_'+filterYear:''+filterYear;
  const header='Date;N° Facture;Compte;Activité;Libellé;Mode paiement;Crédit;Solde\n';
  let solde=0;
  const rows=[...data].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
    solde+=r.amount;const a=getAct(r.activite),p=getPay(r.paiement||'cb');
    return`${r.date};${r.facture||''};${a.compte};${a.label};${r.desc};${p.label};${r.amount.toFixed(2).replace('.',',')};${solde.toFixed(2).replace('.',',')}`;
  }).join('\n');
  const total=sum(data);
  const achRows='\n\nACHATS / CHARGES\nDate;N° Facture;Catégorie;Libellé;Montant\n'+[...acData].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>`${r.date};${r.facture||''};${r.cat};${r.desc};${r.amount.toFixed(2).replace('.',',')}`).join('\n');
  const blob=new Blob(['\uFEFF'+header+rows+`\n;;TOTAL;;${total.toFixed(2).replace('.',',')};;`+achRows],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`CSCAR_${period}.csv`;a.click();
  showToast('CSV ✓');
}
